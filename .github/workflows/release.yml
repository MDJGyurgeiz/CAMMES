# Build della release: su ogni tag v* compila cammes.exe su runner Windows,
# con i GATE di pubblicazione (AUDIT REL-02, controrevisione v3.4.1):
#   1. firmware-gate: ricompila master.ino ALL'ESATTO tag e verifica lo
#      SHA256 dichiarato in fw/version.json (riproducibilità = REL-07);
#   2. npm ci dal lockfile (niente drift di dipendenze);
#   3. tag == package.json (coerenza versioni; test_version.js copre il resto);
#   4. lint + suite completa;
#   5. SBOM rigenerato in CI e confrontato coi file committati (fallisce se
#      differiscono);
#   6. smoke test dell'EXE senza hardware: avvio su porte alternative,
#      home + /api/firmware-info raggiungibili con appVersion == tag,
#      chiusura e rilascio porta;
#   7. allega exe + sha256 + zip + RELEASE_MANIFEST + SBOM alla release.
# Se un gate fallisce NON si pubblica nulla.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # GATE FIRMWARE: l'HEX imbarcato nell'exe deve essere riproducibile
  # dall'esatto commit del tag di release (stesso core AVR pinnato di
  # firmware.yml: arduino:avr@1.8.7).
  firmware-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installa arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Installa core AVR pinnato
        shell: pwsh
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr@1.8.7
          arduino-cli version

      - name: Ricompila e confronta SHA256 (fw del tag di release)
        shell: pwsh
        working-directory: cammes
        run: node tools/verify_firmware.js --compile --fqbn arduino:avr:uno

  build:
    runs-on: windows-latest
    needs: firmware-gate
    defaults:
      run:
        working-directory: cammes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installa dipendenze (npm ci, dal lockfile)
        run: npm ci

      - name: Verifica che il tag corrisponda a package.json
        shell: pwsh
        run: |
          $pkg = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}".TrimStart('v')
          if ($pkg -ne $tag) { Write-Error "Tag v$tag ma package.json dice $pkg"; exit 1 }

      - name: Lint (gate di pubblicazione)
        run: npm run lint

      - name: Test (gate di pubblicazione)
        run: npm test

      - name: SBOM riproducibile (rigenera e confronta col committato)
        shell: pwsh
        run: |
          node tools/gen_sbom.js
          git diff --exit-code -- SBOM.json SBOM.md
          if ($LASTEXITCODE -ne 0) { Write-Error "SBOM rigenerato diverso da quello committato"; exit 1 }

      - name: Build exe (pkg)
        run: npm run build

      # SMOKE TEST senza hardware: l'exe parte su porte alternative, serve la
      # home e /api/firmware-info risponde con la versione del tag; poi si
      # chiude e la porta torna libera. Niente Arduino sul runner: il server
      # deve comunque avviarsi (modalita' senza seriale).
      - name: Smoke test exe (avvio, endpoint, chiusura)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          $p = Start-Process -FilePath ".\cammes.exe" -ArgumentList "--no-browser","--port","3210","--ws-port","3211" -PassThru -WorkingDirectory (Get-Location)
          $ok = $false
          foreach ($i in 1..30) {
            Start-Sleep -Milliseconds 500
            try {
              $r = Invoke-WebRequest -Uri "http://localhost:3210/api/firmware-info" -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) { $ok = $true; break }
            } catch {}
          }
          if (-not $ok) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue; Write-Error "exe non risponde su :3210 entro 15 s"; exit 1 }
          $info = $r.Content | ConvertFrom-Json
          if ($info.appVersion -ne $tag) { Stop-Process -Id $p.Id -Force; Write-Error "appVersion $($info.appVersion) != tag $tag"; exit 1 }
          $home_ = Invoke-WebRequest -Uri "http://localhost:3210/" -UseBasicParsing -TimeoutSec 5
          if ($home_.StatusCode -ne 200 -or $home_.Content -notmatch 'CAMMES') { Stop-Process -Id $p.Id -Force; Write-Error "home page non valida"; exit 1 }
          Stop-Process -Id $p.Id -Force
          Start-Sleep -Seconds 2
          $still = $false
          try { $c = New-Object Net.Sockets.TcpClient; $c.Connect('localhost', 3210); $still = $c.Connected; $c.Close() } catch {}
          if ($still) { Write-Error "porta 3210 ancora occupata dopo la chiusura"; exit 1 }
          Write-Host "Smoke OK: appVersion=$($info.appVersion), home servita, porta rilasciata"

      - name: SHA256
        shell: pwsh
        run: |
          $h = (Get-FileHash cammes.exe -Algorithm SHA256).Hash.ToLower()
          "$h  cammes.exe" | Out-File -Encoding ascii cammes.exe.sha256
          Get-Content cammes.exe.sha256

      # L'exe è autosufficiente (driver seriali imbarcati, estratti al primo
      # avvio); lo zip aggiunge manuale e istruzioni per chi preferisce tutto insieme.
      - name: Pacchetto completo (zip)
        shell: pwsh
        run: |
          "CAMMES v${{ github.ref_name }}`r`n`r`n1. Copia cammes.exe in una cartella qualsiasi (es. C:\CAMMES)`r`n2. Doppio click su cammes.exe: al primo avvio estrae i driver seriali da solo`r`n3. Collega l'Arduino via USB (prima o dopo l'avvio, fa lo stesso)`r`n4. Il browser si apre da solo su http://localhost:3000`r`n`r`nManuale completo: MANUALE_OPERATORE.md (apribile con qualsiasi editor)" | Out-File -Encoding utf8 LEGGIMI.txt
          Compress-Archive -Path cammes.exe, LEGGIMI.txt, ..\MANUALE_OPERATORE.md -DestinationPath cammes-completo.zip

      # AUDIT REL-02: manifest e SBOM viaggiano CON la release (tracciabilità)
      - name: Allega alla release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cammes/cammes.exe
            cammes/cammes.exe.sha256
            cammes/cammes-completo.zip
            cammes/SBOM.json
            cammes/SBOM.md
            RELEASE_MANIFEST.json
