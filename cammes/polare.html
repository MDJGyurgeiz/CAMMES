<!doctype html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CAMMES - Polare</title>
    <link rel="stylesheet" href="style.css">
    <script src="cammes-ui.js"></script>
</head>
<body>

<script src="responsivevoice.js"></script>

<div class="app-container">

    <!-- Header -->
    <div class="header">
        <img src="images/logo.jpg" alt="CAMMES">
        <h1>CAMMES</h1>
        <div class="nav-links">
            <a href="alzata.html">Alzata</a>
            <a href="polare.html" class="active">Polare</a>
            <a href="grafici.html">Confronto</a>
            <a href="analisi.html">Analisi</a>
        </div>
        <div class="header-spacer"></div>
        <div class="status-leds" aria-label="Stato connessioni">
            <span class="status-led"><span id="ledServer" class="led"></span>Server</span>
            <span class="status-led"><span id="ledSensor" class="led"></span>Sensore</span>
            <span class="status-led"><span id="ledEncoder" class="led"></span>Encoder</span>
        </div>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambia tema" title="Cambia tema chiaro/scuro">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <!-- Main content: Gauge + Polar Chart -->
    <div class="main-grid">

        <!-- Left: Gauge -->
        <div class="card gauge-card">
            <div class="card-title">Misura in tempo reale</div>
            <div id="microm" class="gauge-svg-host"></div>
            <form name="cpot">
                <input type="text" name="cpot" readonly class="gauge-value">
            </form>
            <form name="imp2">
                <input type="text" name="imp2" readonly class="gauge-degrees">
            </form>
            <div class="controls-group mt-8">
                <input type="text" id="diam" placeholder="diametro mm" autofocus class="input" style="width:160px;" data-tip="<strong>Diametro a riposo</strong>Diametro nominale dell'albero base (parte non sollevata). Necessario per costruire il grafico polare partendo dalla circonferenza esterna.">
                <span class="help-icon" data-tip="<strong>Come misurarlo</strong>Con un calibro, misura il diametro dell'albero in una zona NON sollevata (lobo base, non sul fianco/picco). Esempio: 26 mm per camme moto da 600cc, 32 mm per auto 4 cilindri." tabindex="0">?</span>
            </div>
            <span style="font-size:12px;color:var(--text-muted);">diametro albero a riposo</span>
        </div>

        <!-- Right: Polar Chart -->
        <div class="card chart-card">
            <div class="card-title">Profilo Polare 360°</div>
            <canvas id="birdsChart" width="900" height="600"></canvas>
        </div>

    </div>

    <!-- Controls -->
    <div class="card">
        <div class="card-title">Controlli scansione polare</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-success" onclick="start();" data-tip="<strong>Avvia scansione polare</strong>Misura ogni grado camma e calcola il raggio polare = diametro/2 + alzata. Necessario aver inserito il diametro a riposo.">&#9654; START</button>
                <button class="btn btn-danger" onclick="stop();" data-tip="<strong>Pausa</strong>Sospende temporaneamente la scansione. Premi PAUSA nuovamente per riprendere.">&#10074;&#10074; PAUSA</button>
                <button class="btn btn-secondary" onclick="location.reload(true);" data-tip="<strong>Reset completo</strong>Ricarica la pagina e azzera tutto.">&#8634; RESET</button>
            </div>

            <div class="separator"></div>

            <form name="mas">
                <input type="text" name="mas" value=" max" readonly class="max-display" data-tip="<strong>Picco rilevato</strong>Grado camma e raggio polare massimo durante la scansione.">
            </form>

            <div class="separator"></div>

            <div class="controls-group">
                <input type="text" id="nome" placeholder="nome file" class="input" data-tip="<strong>Nome file</strong>Suffisso '_pol' viene aggiunto automaticamente. Salva i punti come coppie (cos,sin) per la sezione 'Confronto'.">
                <input type="submit" value="Salva" class="btn btn-accent" onclick="sav();">
            </div>
            <form name="salva" style="display:inline;">
                <input type="text" name="salva" readonly class="status-text" style="background:transparent;border:none;" size="12">
            </form>
        </div>

        <!-- Progress bar scansione -->
        <div id="scan-progress-wrap" class="scan-progress-wrap" aria-live="polite">
            <span class="scan-progress-label">Scansione</span>
            <div class="scan-progress-bar">
                <div id="scan-progress-fill" class="scan-progress-fill"></div>
            </div>
            <span id="scan-progress-pct" class="scan-progress-pct">0%</span>
            <span id="scan-progress-eta" class="scan-progress-eta"></span>
        </div>
    </div>

    <!-- Manual rotation -->
    <div class="card">
        <div class="card-title">Rotazione manuale</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-secondary btn-sm" onclick="m1();" data-tip="<strong>-1&deg;</strong>Ruota indietro di 1 grado camma.">&#8722;</button>
                <input type="text" name="step" placeholder="gradi" id="step" class="input" style="width:120px;" data-tip="<strong>Posizione target</strong>Grado camma assoluto. Premi Ruota per spostarti.">
                <button class="btn btn-secondary btn-sm" onclick="p1();" data-tip="<strong>+1&deg;</strong>Ruota avanti di 1 grado camma.">+</button>
                <button class="btn btn-accent" id="cf" onclick="ruota();" data-tip="<strong>Ruota</strong>Sposta l'albero al grado camma indicato a sinistra.">Ruota</button>
            </div>

            <div class="separator"></div>

            <div class="toggle-group">
                <label class="switch" data-tip="<strong>Senso di rotazione</strong>Inverte il senso del motore.">
                    <input type="checkbox" onchange="rlb();">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="rlabel">senso orario</span>
            </div>
        </div>
    </div>

</div>

<!-- ============================================
     JavaScript - Logica invariata
     ============================================ -->

<script>
// Gauge moderno SVG (vedi alzata.html per dettagli)
var gaugemicrom = window.cammesGauge.create('microm', {
    min: 0, max: 25, size: 260, unit: 'mm', decimals: 2,
    majorTicks: 10, minorTicksBetween: 4
});
gaugemicrom.draw = function () {};
Object.defineProperty(gaugemicrom, 'value', {
    set: function (v) { gaugemicrom.setValue(v); },
    get: function () { return 0; }
});
</script>

<script>
var msgold = "***";
var k = 0;
var max = 0;
var maxg = 0;
var pdata = new Array();
var pdindex = new Array();
var msg = "";
var POL_TOTAL_STEPS = 360;
var POL_TIME_SEC    = 90;  // stima a priori (ordine grandezza, usata per ETA iniziale)
var scanEta = window.cammesEta ? window.cammesEta.create() : { start:function(){return this;}, tick:function(){return null;}, stop:function(){} };
var engineSocket = new WebSocket("ws:localhost:8080");

engineSocket.onopen = function(event) {
    document.imp2.imp2.value = "  gradi  " + "0";
    document.cpot.cpot.value = " " + "00.00";
    gaugemicrom.value = 0;
    gaugemicrom.draw();
    sendSocket = new WebSocket("ws:localhost:8080");
    msgold = "***";
};

engineSocket.onmessage = function(event) {
    msg = event.data;

    if (msg.substring(0, 1) != "*") {
        if (Number(msg) < 10) { msg2 = "0" + msg; }
        else { msg2 = msg; }

        if (msg < 32) {
            document.cpot.cpot.value = " " + msg2;
            gaugemicrom.value = msg;
            gaugemicrom.draw();
        } else {
            msg = "0.00";
            document.cpot.cpot.value = "mic out";
        }

        diametro = document.getElementById("diam").value;
        radius = Number(diametro) / 2;

        if (startflag == 1 & i <= 360 & stepflag == 0) {
            pdindex[i] = i;
            pdata[i] = Number(msg) + radius;

            if (pdata[i] > max) {
                max = pdata[i];
                maxg = pdindex[i];
            }

            max2 = max.toString();
            max3 = max2.split('.');
            if (max3.length > 1) { max4 = max3[0] + "." + max3[1].substring(0, 2); }
            else { max4 = max3[0] + ".00"; }

            document.mas.mas.value = " max  " + maxg + " gradi" + "       " + max4;

            birdsData.labels.push(i);
            birdsData.datasets.forEach((dataset) => {
                polar = Number(msg) + radius;
                pdata[i] = Number(msg) + radius;
                dataset.data.push(polar);
            });
            window.polarAreaChart.update();
        }
    }

    if (i == 360) {
        if (startflag == 1) {
            var x = "sequenza di misura   terminata ";
            responsiveVoice.speak(x, "Italian Female", { volume: 3 });
            if (window.cammesScanProgress) window.cammesScanProgress.set(POL_TOTAL_STEPS, POL_TOTAL_STEPS, 0);
            if (scanEta) scanEta.stop();
            if (window.cammesToast) window.cammesToast({ kind: 'success', title: 'Scansione polare completata', body: 'Picco ' + (max ? max.toFixed(3) : '0') + ' mm a ' + maxg + '&deg;.', duration: 5000 });
        }
        startflag = 0;
    }

    if (msg.substring(0, 1) == "*") {
        document.imp2.imp2.value = "  gradi  " + i;
        if (startflag === 1 && window.cammesScanProgress) {
            var etaSec = scanEta.tick(i);
            window.cammesScanProgress.set(i, POL_TOTAL_STEPS, etaSec);
        }
        if (i < 360) {
            if (stepflag == 0) {
                if (rsign == 1) { sendSocket.send('p'); }
                if (rsign == -1) { sendSocket.send('q'); }
                i = i + 1;
            }
        }
    }
};
</script>

<script>
var i = 0;
function start() {
    var diamEl = document.getElementById("diam");
    diametro = diamEl ? diamEl.value : '';
    radius = Number(diametro) / 2;
    if (!isFinite(radius) || radius <= 0) {
        if (window.cammesValidate) window.cammesValidate.error(diamEl, 'Inserisci il diametro a riposo (mm) prima di avviare.');
        else alert('inserire diametro a riposo');
        return;
    }
    var x = "sequenza di misura   iniziata ";
    responsiveVoice.speak(x, "Italian Female", { volume: 3 });
    i = i + 1;
    document.imp2.imp2.value = "  gradi  " + i;
    if (rsign == 1) { sendSocket.send('p'); }
    if (rsign == -1) { sendSocket.send('q'); }
    stepflag = 0;
    startflag = 1;
    scanEta.start(POL_TOTAL_STEPS);
    if (window.cammesScanProgress) window.cammesScanProgress.set(0, POL_TOTAL_STEPS, POL_TIME_SEC);
    if (window.cammesToast) window.cammesToast({ kind: 'info', title: 'Scansione polare avviata', body: 'Diametro base ' + Number(diametro).toFixed(2) + ' mm.', duration: 2500 });
}
</script>

<script>
var stepflag = 0;
function stop() {
    if (stepflag == 0) {
        stepflag = 1;
        if (scanEta) scanEta.stop();
        if (window.cammesScanProgress) window.cammesScanProgress.reset();
        if (window.cammesToast) window.cammesToast({ kind: 'warn', title: 'Scansione in pausa', body: 'Premi PAUSA di nuovo per riprendere.', duration: 2500 });
    } else {
        if (stepflag == 1) {
            stepflag = 0;
            if (window.cammesToast) window.cammesToast({ kind: 'info', title: 'Scansione ripresa', duration: 1800 });
        }
    }
}
</script>

<script src="Chart.min.js"></script>

<script>
var birdsCanvas = document.getElementById("birdsChart");
Chart.defaults.global.defaultFontFamily = "Lato";
Chart.defaults.global.defaultFontSize = 18;
Chart.defaults.global.defaultFontColor = "#8888aa";

var birdsData = {
    labels: [],
    datasets: [{
        data: [],
        backgroundColor: [],
        borderColor: "rgba(0, 212, 255, 0.3)"
    }]
};

var chartOptions = {
    startAngle: 0,
    legend: { position: 'left', display: false },
    animation: { animateRotate: false },
    scale: {
        ticks: {
            fontColor: '#8888aa',
            backdropColor: 'transparent'
        },
        gridLines: { color: '#2a2a4a' },
        angleLines: { color: '#2a2a4a' }
    }
};

var polarAreaChart = new Chart(birdsCanvas, {
    type: 'polarArea',
    data: birdsData,
    options: chartOptions
});
</script>

<script>
var i = 0;
var dato = 0;
var newlabel;
function insert() {
    i = i + 1;
    newlabel = 5;
    dato = 20;
    config.data.labels.push(newlabel);
    config.data.datasets.forEach((dataset) => {
        dataset.data.push(dato);
    });
    window.myLine.update();
}
</script>

<script>
function reset() {
    while (config.data.labels.length > 0) {
        config.data.labels.pop();
        config.data.datasets.forEach((dataset) => {
            dataset.data.pop();
        });
    }
    window.myLine.update();
}
</script>

<script>
function update() {
    for (k = 1; k <= 360; k++) {
        newlabel = k;
        birdsData.labels.push(newlabel);
        birdsData.datasets.forEach((dataset) => {
            dataset.data.push(k * 10);
        });
    }
    window.polarAreaChart.update();
}
</script>

<script>
var stringa = "";
function sav() {
    var nameEl = document.getElementById("nome");
    var rawName = (nameEl && nameEl.value || '').trim();
    if (!rawName) {
        if (window.cammesValidate) window.cammesValidate.error(nameEl, 'Inserisci un nome file prima di salvare.');
        else alert('Inserisci un nome file');
        return;
    }
    if (!pdindex || pdindex.length < 2) {
        if (window.cammesToast) window.cammesToast({ kind: 'warn', title: 'Nessun dato', body: 'Esegui una scansione prima di salvare.', duration: 3000 });
        return;
    }
    var safeName = rawName.replace(/[^A-Za-z0-9_\-]/g, '_');
    stringa = "";
    for (t = 1; t < pdindex.length; t++) {
        seno = pdata[t] * Math.sin(2 * Math.PI * pdindex[t] / 360);
        coseno = pdata[t] * Math.cos(2 * Math.PI * pdindex[t] / 360);
        senr = Math.round(seno * Math.pow(10, 8)) / Math.pow(10, 8);
        cosenr = Math.round(coseno * Math.pow(10, 8)) / Math.pow(10, 8);
        stringa = stringa + cosenr + "," + senr + "\r\n";
    }
    fname = safeName + "_pol";
    stringa2 = "*" + fname + "*" + "_pline" + "\r\n" + stringa;
    document.salva.salva.value = " file salvato";
    sendSocket.send(stringa2);
    if (window.cammesToast) window.cammesToast({ kind: 'success', title: 'File polare salvato', body: fname + '.scr in cartella misure.', duration: 4000 });
}
</script>

<script>
var dif = 0;
var crot = "";
var oldg = 0;
function ruota() {
    dg = document.getElementById("step").value;
    w = "rotazione a   " + dg + " gradi  attivata";
    responsiveVoice.speak(w, "Italian Female", { volume: 3 });

    if (dg - oldg < 0) {
        dif = -(dg - oldg);
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 & dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$-" + (dif); }
        if (rsign == -1) { crot = "$+" + (dif); }
    }
    if (dg - oldg > 0) {
        dif = dg - oldg;
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 & dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$+" + (dif); }
        if (rsign == -1) { crot = "$-" + (dif); }
    }
    if (dg - oldg != 0) { sendSocket.send(crot + '\n'); }
    oldg = dg;
}
</script>

<script>
function p1() {
    oldg = Number(oldg) + 1;
    if (rsign == 1) { sendSocket.send('$+001\n'); }
    if (rsign == -1) { sendSocket.send('$-001\n'); }
    document.getElementById("step").value = oldg;
}
</script>

<script>
function m1() {
    oldg = Number(oldg) - 1;
    if (rsign == 1) { sendSocket.send('$-001\n'); }
    if (rsign == -1) { sendSocket.send('$+001\n'); }
    document.getElementById("step").value = oldg;
}
</script>

<script>
var rot = 0;
var rsign = 1;
function rlb() {
    rot = rot + 1;
    if (rot == 2) { rot = 0; }
    if (rot == 0) {
        document.getElementById("rlabel").innerHTML = "senso orario";
        rsign = 1;
    }
    if (rot == 1) {
        document.getElementById("rlabel").innerHTML = "senso antiorario";
        rsign = -1;
    }
}
</script>

</body>
