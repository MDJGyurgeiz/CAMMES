<!doctype html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>CAMMES - Polare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script src="gauge.min.js"></script>
<script src="jquery.min.js"></script>
<script src="responsivevoice.js"></script>

<div class="app-container">

    <!-- Header -->
    <div class="header">
        <img src="images/logo.jpg" alt="CAMMES">
        <h1>CAMMES</h1>
        <div class="nav-links">
            <a href="alzata.html">Alzata</a>
            <a href="polare.html" class="active">Polare</a>
            <a href="grafici.html">Grafici</a>
            <a href="analisi.html">Analisi</a>
        </div>
    </div>

    <!-- Main content: Gauge + Polar Chart -->
    <div class="main-grid">

        <!-- Left: Gauge -->
        <div class="card gauge-card">
            <div class="card-title">Misura in tempo reale</div>
            <canvas id="microm"></canvas>
            <form name="cpot">
                <input type="text" name="cpot" readonly class="gauge-value">
            </form>
            <form name="imp2">
                <input type="text" name="imp2" readonly class="gauge-degrees">
            </form>
            <div class="controls-group mt-8">
                <input type="text" id="diam" placeholder="diametro mm" autofocus class="input" style="width:160px;">
            </div>
            <span style="font-size:12px;color:var(--text-muted);">diametro albero a riposo</span>
        </div>

        <!-- Right: Polar Chart -->
        <div class="card chart-card">
            <div class="card-title">Profilo Polare 360°</div>
            <canvas id="birdsChart" width="900" height="600"></canvas>
        </div>

    </div>

    <!-- Controls -->
    <div class="card">
        <div class="card-title">Controlli</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-success" onclick="start();">&#9654; START</button>
                <button class="btn btn-danger" onclick="stop();">&#10074;&#10074; PAUSA</button>
                <button class="btn btn-secondary" onclick="location.reload(true);">&#8634; RESET</button>
            </div>

            <div class="separator"></div>

            <form name="mas">
                <input type="text" name="mas" value=" max" readonly class="max-display">
            </form>

            <div class="separator"></div>

            <div class="controls-group">
                <input type="text" id="nome" placeholder="nome file" class="input">
                <input type="submit" value="Salva" class="btn btn-accent" onclick="sav();">
            </div>
            <form name="salva" style="display:inline;">
                <input type="text" name="salva" readonly class="status-text" style="background:transparent;border:none;" size="12">
            </form>
        </div>
    </div>

    <!-- Manual rotation -->
    <div class="card">
        <div class="card-title">Rotazione manuale</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-secondary btn-sm" onclick="m1();">&#8722;</button>
                <input type="text" name="step" placeholder="gradi" id="step" class="input" style="width:120px;">
                <button class="btn btn-secondary btn-sm" onclick="p1();">+</button>
                <button class="btn btn-accent" id="cf" onclick="ruota();">Ruota</button>
            </div>

            <div class="separator"></div>

            <div class="toggle-group">
                <label class="switch">
                    <input type="checkbox" onchange="rlb();">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="rlabel">senso orario</span>
            </div>
        </div>
    </div>

</div>

<!-- ============================================
     JavaScript - Logica invariata
     ============================================ -->

<script>
// Gauge setup
var gaugemicrom = new RadialGauge({
    renderTo: 'microm',
    width: 280,
    height: 280,
    units: 'mm',
    title: false,
    minValue: 0.00,
    maxValue: 25.00,
    majorTicks: ['0','2.5','5','7.5','10','12.5','15','17.5','20','22.5','25'],
    minorTicks: 2,
    strokeTicks: false,
    highlights: [{ from: 0, to: 25, color: '#00d4ff' }],
    colorPlate: '#1a1a2e',
    colorMajorTicks: '#f5f5f5',
    colorMinorTicks: '#555577',
    colorTitle: '#fff',
    colorUnits: '#8888aa',
    colorNumbers: '#e0e0e0',
    colorNeedle: 'rgba(0, 212, 255, 1)',
    colorNeedleEnd: 'rgba(0, 180, 220, .9)',
    colorBorderOuter: '#2a2a4a',
    colorBorderOuterEnd: '#1a1a2e',
    colorBorderMiddle: '#2a2a4a',
    colorBorderMiddleEnd: '#0f0f1a',
    colorBorderInner: '#1a1a2e',
    colorBorderInnerEnd: '#0f0f1a',
    colorNeedleShadowUp: 'rgba(0,0,0,0)',
    colorNeedleShadowDown: 'rgba(0,0,0,0.3)',
    valueBox: false,
    valueInt: 2,
    valueDec: 2,
    animation: false,
});
gaugemicrom.draw();
</script>

<script>
var msgold = "***";
var k = 0;
var max = 0;
var maxg = 0;
var pdata = new Array();
var pdindex = new Array();
var msg = "";
var engineSocket = new WebSocket("ws:localhost:8080");

engineSocket.onopen = function(event) {
    document.imp2.imp2.value = "  gradi  " + "0";
    document.cpot.cpot.value = " " + "00.00";
    gaugemicrom.value = 0;
    gaugemicrom.draw();
    sendSocket = new WebSocket("ws:localhost:8080");
    msgold = "***";
};

engineSocket.onmessage = function(event) {
    msg = event.data;

    if (msg.substring(0, 1) != "*") {
        if (Number(msg) < 10) { msg2 = "0" + msg; }
        else { msg2 = msg; }

        if (msg < 32) {
            document.cpot.cpot.value = " " + msg2;
            gaugemicrom.value = msg;
            gaugemicrom.draw();
        } else {
            msg = "0.00";
            document.cpot.cpot.value = "mic out";
        }

        diametro = document.getElementById("diam").value;
        radius = Number(diametro) / 2;

        if (startflag == 1 & i <= 360 & stepflag == 0) {
            pdindex[i] = i;
            pdata[i] = Number(msg) + radius;

            if (pdata[i] > max) {
                max = pdata[i];
                maxg = pdindex[i];
            }

            max2 = max.toString();
            max3 = max2.split('.');
            if (max3.length > 1) { max4 = max3[0] + "." + max3[1].substring(0, 2); }
            else { max4 = max3[0] + ".00"; }

            document.mas.mas.value = " max  " + maxg + " gradi" + "       " + max4;

            birdsData.labels.push(i);
            birdsData.datasets.forEach((dataset) => {
                polar = Number(msg) + radius;
                pdata[i] = Number(msg) + radius;
                dataset.data.push(polar);
            });
            window.polarAreaChart.update();
        }
    }

    if (i == 360) {
        if (startflag == 1) {
            var x = "sequenza di misura   terminata ";
            responsiveVoice.speak(x, "Italian Female", { volume: 3 });
        }
        startflag = 0;
    }

    if (msg.substring(0, 1) == "*") {
        document.imp2.imp2.value = "  gradi  " + i;
        if (i < 360) {
            if (stepflag == 0) {
                if (rsign == 1) { sendSocket.send('p'); }
                if (rsign == -1) { sendSocket.send('q'); }
                i = i + 1;
            }
        }
    }
};
</script>

<script>
var i = 0;
function start() {
    diametro = document.getElementById("diam").value;
    radius = diametro / 2;
    if (radius == 0) { alert('inserire diametro a riposo'); }
    if (radius != 0) {
        var x = "sequenza di misura   iniziata ";
        responsiveVoice.speak(x, "Italian Female", { volume: 3 });
        i = i + 1;
        document.imp2.imp2.value = "  gradi  " + i;
        if (rsign == 1) { sendSocket.send('p'); }
        if (rsign == -1) { sendSocket.send('q'); }
        stepflag = 0;
        startflag = 1;
    }
}
</script>

<script>
var stepflag = 0;
function stop() {
    if (stepflag == 0) { stepflag = 1; }
    else {
        if (stepflag == 1) { stepflag = 0; }
    }
}
</script>

<script src="Chart.min.js"></script>

<script>
var birdsCanvas = document.getElementById("birdsChart");
Chart.defaults.global.defaultFontFamily = "Lato";
Chart.defaults.global.defaultFontSize = 18;
Chart.defaults.global.defaultFontColor = "#8888aa";

var birdsData = {
    labels: [],
    datasets: [{
        data: [],
        backgroundColor: [],
        borderColor: "rgba(0, 212, 255, 0.3)"
    }]
};

var chartOptions = {
    startAngle: 0,
    legend: { position: 'left', display: false },
    animation: { animateRotate: false },
    scale: {
        ticks: {
            fontColor: '#8888aa',
            backdropColor: 'transparent'
        },
        gridLines: { color: '#2a2a4a' },
        angleLines: { color: '#2a2a4a' }
    }
};

var polarAreaChart = new Chart(birdsCanvas, {
    type: 'polarArea',
    data: birdsData,
    options: chartOptions
});
</script>

<script>
var i = 0;
var dato = 0;
var newlabel;
function insert() {
    i = i + 1;
    newlabel = 5;
    dato = 20;
    config.data.labels.push(newlabel);
    config.data.datasets.forEach((dataset) => {
        dataset.data.push(dato);
    });
    window.myLine.update();
}
</script>

<script>
function reset() {
    while (config.data.labels.length > 0) {
        config.data.labels.pop();
        config.data.datasets.forEach((dataset) => {
            dataset.data.pop();
        });
    }
    window.myLine.update();
}
</script>

<script>
function update() {
    for (k = 1; k <= 360; k++) {
        newlabel = k;
        birdsData.labels.push(newlabel);
        birdsData.datasets.forEach((dataset) => {
            dataset.data.push(k * 10);
        });
    }
    window.polarAreaChart.update();
}
</script>

<script>
var stringa = "";
function sav() {
    for (t = 1; t < pdindex.length; t++) {
        seno = pdata[t] * Math.sin(2 * Math.PI * pdindex[t] / 360);
        coseno = pdata[t] * Math.cos(2 * Math.PI * pdindex[t] / 360);
        senr = Math.round(seno * Math.pow(10, 8)) / Math.pow(10, 8);
        cosenr = Math.round(coseno * Math.pow(10, 8)) / Math.pow(10, 8);
        stringa = stringa + cosenr + "," + senr + "\r\n";
    }
    fname = document.getElementById("nome").value;
    fname = fname + "_pol";
    stringa2 = "*" + fname + "*" + "_pline" + "\r\n" + stringa;
    document.salva.salva.value = " file salvato";
    sendSocket.send(stringa2);
}
</script>

<script>
var dif = 0;
var crot = "";
var oldg = 0;
function ruota() {
    dg = document.getElementById("step").value;
    w = "rotazione a   " + dg + " gradi  attivata";
    responsiveVoice.speak(w, "Italian Female", { volume: 3 });

    if (dg - oldg < 0) {
        dif = -(dg - oldg);
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 & dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$-" + (dif); }
        if (rsign == -1) { crot = "$+" + (dif); }
    }
    if (dg - oldg > 0) {
        dif = dg - oldg;
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 & dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$+" + (dif); }
        if (rsign == -1) { crot = "$-" + (dif); }
    }
    if (dg - oldg != 0) { sendSocket.send(crot + '\n'); }
    oldg = dg;
}
</script>

<script>
function p1() {
    oldg = Number(oldg) + 1;
    if (rsign == 1) { sendSocket.send('$+001\n'); }
    if (rsign == -1) { sendSocket.send('$-001\n'); }
    document.getElementById("step").value = oldg;
}
</script>

<script>
function m1() {
    oldg = Number(oldg) - 1;
    if (rsign == 1) { sendSocket.send('$-001\n'); }
    if (rsign == -1) { sendSocket.send('$+001\n'); }
    document.getElementById("step").value = oldg;
}
</script>

<script>
var rot = 0;
var rsign = 1;
function rlb() {
    rot = rot + 1;
    if (rot == 2) { rot = 0; }
    if (rot == 0) {
        document.getElementById("rlabel").innerHTML = "senso orario";
        rsign = 1;
    }
    if (rot == 1) {
        document.getElementById("rlabel").innerHTML = "senso antiorario";
        rsign = -1;
    }
}
</script>

</body>
</html>
