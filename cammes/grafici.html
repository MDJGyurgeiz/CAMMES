<script>
// Chart.js v4 — confronto fino a 4 alzate (theme-aware)
var valori = new Array();
var chartColors = {
    red:   'rgb(255, 0, 0)',
    blue:  'rgb(0, 0, 200)',
    green: 'rgb(0, 150, 0)',
    black: 'rgb(200, 200, 200)'
};

function grfColors() {
    var css = window.cammesGetCssVar || function(){ return ''; };
    return {
        grid: css('--grid')       || '#2a2a4a',
        text: css('--text-muted') || '#8888aa'
    };
}

var lineChartData = {
    labels: [],
    datasets: [
        { label: 'grafico1', borderColor: chartColors.red,   backgroundColor: chartColors.red,   fill: false, pointHoverRadius: 5, pointRadius: 1, borderWidth: 2, tension: 0.15, data: [] },
        { label: 'grafico2', borderColor: chartColors.blue,  backgroundColor: chartColors.blue,  fill: false, pointHoverRadius: 5, pointRadius: 1, borderWidth: 2, tension: 0.15, data: [] },
        { label: 'grafico3', borderColor: chartColors.green, backgroundColor: chartColors.green, fill: false, pointHoverRadius: 5, pointRadius: 1, borderWidth: 2, tension: 0.15, data: [] },
        { label: 'grafico4', borderColor: chartColors.black, backgroundColor: chartColors.black, fill: false, pointHoverRadius: 5, pointRadius: 1, borderWidth: 2, tension: 0.15, data: [] }
    ]
};

window.onload = function() {
    var ctx = document.getElementById('canvas').getContext('2d');
    window.myLine = new Chart(ctx, {
        type: 'line',
        data: lineChartData,
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 250 },
            plugins: {
                legend:  { labels: { color: grfColors().text } },
                tooltip: { mode: 'index', intersect: false }
            },
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: {
                    display: false,
                    title: { display: true, text: 'gradi', color: grfColors().text },
                    grid:  { color: grfColors().grid }
                },
                y: {
                    type: 'linear',
                    title: { display: true, text: 'valore (mm)', color: grfColors().text },
                    grid:  { color: grfColors().grid, drawOnChartArea: true },
                    ticks: { color: grfColors().text }
                }
            }
        }
    });
};

document.addEventListener('cammes:theme:change', function () {
    if (!window.myLine) return;
    var c = grfColors();
    var o = window.myLine.options;
    o.plugins.legend.labels.color = c.text;
    o.scales.x.grid.color = c.grid;  o.scales.x.title.color = c.text;
    o.scales.y.grid.color = c.grid;  o.scales.y.title.color = c.text;  o.scales.y.ticks.color = c.text;
    window.myLine.update('none');
});
</script>

<script type="text/javascript">
var index = 0;
var vmax = 0;
var gmax = 0;
function loadFile() {
    vmax = 0;
    gmax = 0;
    var input, file, fr;
    input = document.getElementById('fileinput1');

    if (!input) {
        bodyAppend("p", "non riesco a trovare questo file");
    } else if (!input.files) {
        bodyAppend("p", "il browser non supporta la proprieta' file");
    } else {
        nom = input.files[0].name.split('.');
        lmd = input.files[0].lastModifiedDate.toString();
        nomes = nom[0].split('_');
        tfile = nomes[nomes.length - 1];
        if (tfile != "alz") { alert('tipologia file non valida'); }

        if (tfile == "alz") {
            index = index + 1;
            file = input.files[0];
            fr = new FileReader();
            fr.onload = receivedText;
            fr.readAsText(file);
        }

        function receivedText() {
            showResult(fr, "Text");
            fr = new FileReader();
            fr.onload = receivedBinary;
            fr.readAsBinaryString(file);
        }
    }

    function showResult(fr, label) {
        var markup, result, n, aByte, byteStr;
        var risultato = "";
        result = fr.result;
        for (n = 0; n < result.length; ++n) {
            aByte = result.charCodeAt(n);
            risultato = risultato + String.fromCharCode(aByte);
        }

        risp = risultato.split('\r\n');

        for (i = 1; i <= 361; i++) {
            risp2 = risp[i].split(',');
            valori[i] = risp2[1];
            if (Number(risp2[1]) > vmax) {
                vmax1 = risp2[1];
                vmax = Number(risp2[1]);
                gmax = i;
            }
        }

        vmax2 = vmax1.split('.');
        vmax = vmax2[0] + "." + vmax2[1].substring(0, 2);

        if (index == 1) {
            document.getElementById('g1g').innerHTML = gmax;
            document.getElementById('g1v').innerHTML = vmax;
            document.getElementById('lb1').innerHTML = nom[0];
        }
        if (index == 2) {
            document.getElementById('g2g').innerHTML = gmax;
            document.getElementById('g2v').innerHTML = vmax;
            document.getElementById('lb2').innerHTML = nom[0];
        }
        if (index == 3) {
            document.getElementById('g3g').innerHTML = gmax;
            document.getElementById('g3v').innerHTML = vmax;
            document.getElementById('lb3').innerHTML = nom[0];
        }
        if (index == 4) {
            document.getElementById('g4g').innerHTML = gmax;
            document.getElementById('g4v').innerHTML = vmax;
            document.getElementById('lb4').innerHTML = nom[0];
        }
        update();
    }
}
</script>

<script>
function update() {
    mylabel = "grafico" + index;
    for (k = 1; k <= 361; k++) {
        if (index == 1) {
            lineChartData.labels.push(k);
        }
        lineChartData.datasets.forEach((dataset) => {
            if (dataset.label == mylabel) {
                dataset.data.push(valori[k]);
            }
        });
    }
    window.myLine.update();
}
</script>

<!-- 4 Polar Charts (Chart.js v4) -->
<script>
function polChartOptions() {
    var c = grfColors();
    return {
        responsive: true,
        maintainAspectRatio: false,
        animation: { animateRotate: false, duration: 0 },
        plugins: { legend: { display: false } },
        scales: {
            r: {
                ticks:      { color: c.text, backdropColor: 'transparent' },
                grid:       { color: c.grid },
                angleLines: { color: c.grid },
                startAngle: 0
            }
        }
    };
}

function makePolar(canvasId, borderColor) {
    return new Chart(document.getElementById(canvasId), {
        type: 'polarArea',
        data: { datasets: [{ label: 'g', data: [], backgroundColor: [], borderColor: borderColor, borderWidth: 1 }] },
        options: polChartOptions()
    });
}

var polarAreaChart  = makePolar('birdsChart',  'rgba(255, 0, 0, 0.45)');
var polarAreaChart2 = makePolar('birdsChart2', 'rgba(0, 0, 250, 0.45)');
var polarAreaChart3 = makePolar('birdsChart3', 'rgba(0, 200, 0, 0.45)');
var polarAreaChart4 = makePolar('birdsChart4', 'rgba(200, 200, 200, 0.45)');

document.addEventListener('cammes:theme:change', function () {
    [polarAreaChart, polarAreaChart2, polarAreaChart3, polarAreaChart4].forEach(function (ch) {
        var c = grfColors();
        var r = ch.options.scales.r;
        r.ticks.color = c.text;
        r.grid.color = c.grid;
        r.angleLines.color = c.grid;
        ch.update('none');
    });
});
</script>

        nom = input.files[0].name.split('.');

        nom = input.files[0].name.split('.');

        nomes = nom[0].split('_');
        tfile = nomes[nomes.length - 1];
        if (tfile != "pol") { alert('tipologia file non valida'); }

        if (tfile == "pol") {
            index2 = index2 + 1;
            file = input.files[0];

            fr.onload = receivedText;

                }

        locg = 0;

<script>
// Aggiorna l'N-esimo chart polare con i dati di valori5 (raggi 1..360).
// Usa direttamente chart.data invece di variabili globali birdsData* che
// non vengono più create dal refactor v4 (makePolar incapsula i data).
function update2() {
    var charts = [polarAreaChart, polarAreaChart2, polarAreaChart3, polarAreaChart4];
    var idx = index2 - 1;
    if (idx < 0 || idx >= charts.length) return;
    var ch = charts[idx];
    if (!ch) return;
    if (!ch.data.labels) ch.data.labels = [];
    for (var x = 1; x <= 360; x++) {
        ch.data.labels.push(x);
        ch.data.datasets.forEach(function (ds) { ds.data.push(valori5[x]); });
    }
    ch.update('none');
}
</script>

<!-- URL loader: ?files=nome1.scr,nome2.scr precarica i file dalla Home.
     Si attende che il chart Chart.js sia pronto (window.myLine), poi
     fetch e popola i dataset sequenzialmente imitando loadFile(). -->
<script>
function _loadAlzFromText(text, originalName) {
    // Simula la logica di showResult() ma su testo già fetchato
    if (typeof index === 'undefined') return;
    if (index >= 4) {
        if (window.cammesToast) window.cammesToast({
            kind: 'warn', title: 'Massimo 4 file',
            body: 'Limite Confronto raggiunto. Reset per caricarne altri.',
            duration: 3000
        });
        return;
    }
    index = index + 1;
    var lines = text.split(/\r?\n/);
    var localVmax = 0, localGmax = 0, localVmax1 = '0';
    for (var i = 1; i <= 361 && i < lines.length; i++) {
        var parts = lines[i].split(',');
        if (parts.length < 2) continue;
        valori[i] = parts[1];
        if (Number(parts[1]) > localVmax) {
            localVmax1 = parts[1];
            localVmax = Number(parts[1]);
            localGmax = i;
        }
    }
    // Etichetta = nome file senza .scr / _alz finale
    var label = originalName.replace(/\.(scr|txt|csv)$/i, '').replace(/_alz$/i, '');
    var vparts = String(localVmax1).split('.');
    var vfmt = vparts[0] + '.' + ((vparts[1] || '00') + '00').substring(0, 2);
    var ids = ['g1', 'g2', 'g3', 'g4'];
    var prefix = ids[index - 1];
    document.getElementById(prefix + 'g').innerHTML = localGmax;
    document.getElementById(prefix + 'v').innerHTML = vfmt;
    document.getElementById('lb' + index).innerHTML = label;
    update();
    if (window.cammesToast) window.cammesToast({
        kind: 'success', title: 'File caricato', body: label, duration: 2000
    });
}

function _loadFromUrlIfNeeded() {
    var params = new URLSearchParams(location.search);
    var filesParam = params.get('files');
    if (!filesParam) return;
    var names = filesParam.split(',')
                          .map(function (s) { return s.trim(); })
                          .filter(Boolean)
                          .slice(0, 4);
    if (names.length === 0) return;

    function tryStart(attempts) {
        if (!window.myLine || typeof valori === 'undefined') {
            if (attempts <= 0) return;
            return setTimeout(function () { tryStart(attempts - 1); }, 50);
        }
        names.forEach(function (name, idx) {
            // Stagger leggero per evitare race condition su `index` variabile
            setTimeout(function () {
                fetch('/api/file/' + encodeURIComponent(name), { cache: 'no-store' })
                    .then(function (r) {
                        if (!r.ok) throw new Error('HTTP ' + r.status);
                        return r.text();
                    })
                    .then(function (text) { _loadAlzFromText(text, name); })
                    .catch(function (err) {
                        if (window.cammesToast) window.cammesToast({
                            kind: 'err', title: 'Errore caricamento',
                            body: name + ': ' + err.message, duration: 4000
                        });
                    });
            }, idx * 250);
        });
    }
    tryStart(40);  // ~2 sec max attesa per chart pronto
}
window.addEventListener('DOMContentLoaded', _loadFromUrlIfNeeded);
</script>

<!-- Replay animazione: ridipinge le 4 linee da 0 a 360 gradi in 4 sec.
     Salva una copia originale dei dataset, anima troncando progressivamente
     e a fine animazione ripristina. Cancellabile via stopReplay(). -->
<script>
var _replayRaf = null;
var _replayCancelled = false;
var _replayBackup = null;

function replayAnimation() {
    if (!window.myLine || !lineChartData || !lineChartData.datasets) return;
    // Verifica che ci sia almeno una linea con dati
    var anyData = lineChartData.datasets.some(function (d) { return d.data && d.data.length > 0; });
    if (!anyData) {
        if (window.cammesToast) window.cammesToast({
            kind: 'warn', title: 'Nessun grafico caricato',
            body: 'Carica almeno un file alzata prima di lanciare il replay.',
            duration: 3000
        });
        return;
    }
    // Salva backup (deep copy delle data array) e resetta i dataset a vuoto
    _replayBackup = lineChartData.datasets.map(function (d) { return d.data.slice(); });
    var maxLen = _replayBackup.reduce(function (m, arr) { return Math.max(m, arr.length); }, 0);
    if (maxLen === 0) return;

    _replayCancelled = false;
    document.getElementById('replayBtn').style.display = 'none';
    document.getElementById('replayStopBtn').style.display = '';

    var DURATION = 4000;   // ms totali per arrivare a 360°
    var startTs = null;
    // Disabilita animazione di Chart.js durante il replay (le abbiamo già)
    var origAnim = window.myLine.options.animation;
    window.myLine.options.animation = { duration: 0 };

    function frame(ts) {
        if (_replayCancelled) {
            _restoreFromBackup();
            return;
        }
        if (!startTs) startTs = ts;
        var elapsed = ts - startTs;
        var progress = Math.min(1, elapsed / DURATION);
        // Easing out-quad (decelerazione progressiva, più piacevole)
        var eased = 1 - (1 - progress) * (1 - progress);
        var idx = Math.floor(eased * maxLen);
        if (idx < 1) idx = 1;
        lineChartData.datasets.forEach(function (d, i) {
            var orig = _replayBackup[i];
            d.data = orig.slice(0, idx);
        });
        window.myLine.update('none');
        if (progress < 1) {
            _replayRaf = requestAnimationFrame(frame);
        } else {
            // Restore finale + animazione Chart.js
            _restoreFromBackup();
            window.myLine.options.animation = origAnim;
            if (window.cammesToast) window.cammesToast({
                kind: 'success', title: 'Replay completato', duration: 2000
            });
        }
    }
    _replayRaf = requestAnimationFrame(frame);
}

function _restoreFromBackup() {
    if (!_replayBackup) return;
    lineChartData.datasets.forEach(function (d, i) {
        if (_replayBackup[i]) d.data = _replayBackup[i].slice();
    });
    window.myLine.update('none');
    _replayBackup = null;
    document.getElementById('replayBtn').style.display = '';
    document.getElementById('replayStopBtn').style.display = 'none';
}

function stopReplay() {
    _replayCancelled = true;
    if (_replayRaf) { cancelAnimationFrame(_replayRaf); _replayRaf = null; }
    _restoreFromBackup();
    if (window.cammesToast) window.cammesToast({
        kind: 'info', title: 'Replay interrotto', duration: 1500
    });
}

window.replayAnimation = replayAnimation;
window.stopReplay = stopReplay;
</script>
