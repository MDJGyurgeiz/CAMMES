<!doctype html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CAMMES - Alzata</title>
    <link rel="stylesheet" href="style.css">
    <script src="cammes-ui.js"></script>
</head>
<body>

<script src="responsivevoice.js"></script>

<div class="app-container">

    <!-- Header -->
    <div class="header">
        <img src="images/logo.jpg" alt="CAMMES">
        <h1>CAMMES</h1>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="alzata.html" class="active">Alzata</a>
            <a href="polare.html">Polare</a>
            <a href="grafici.html">Confronto</a>
            <a href="analisi.html">Analisi</a>
        </div>
        <div class="header-spacer"></div>
        <div class="status-leds" aria-label="Stato connessioni">
            <span class="status-led"><span id="ledServer" class="led"></span>Server</span>
            <span class="status-led"><span id="ledSensor" class="led"></span>Sensore</span>
            <span class="status-led"><span id="ledEncoder" class="led"></span>Encoder</span>
        </div>
        <button id="help-toggle" class="help-toggle" type="button" aria-label="Guida rapida" title="Apri la guida rapida">?</button>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Cambia tema" title="Cambia tema chiaro/scuro">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>

    <!-- Main content: Gauge + Chart -->
    <div class="main-grid">

        <!-- Left: Gauge -->
        <div class="card gauge-card">
            <div class="card-title">Misura in tempo reale</div>
            <div id="microm" class="gauge-svg-host"></div>
            <form name="cpot">
                <input type="text" name="cpot" readonly class="gauge-value">
            </form>
            <form name="imp2">
                <input type="text" name="imp2" readonly class="gauge-degrees">
            </form>
        </div>

        <!-- Right: Chart -->
        <div class="card chart-card">
            <div class="card-title">Profilo Alzata 360°</div>
            <canvas id="grafico" width="900" height="500"></canvas>
        </div>

    </div>

    <!-- Controls -->
    <div class="card">
        <div class="card-title">Controlli scansione</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-success" onclick="start();" data-tip="<strong>Avvia scansione</strong>Esegue una rotazione completa di 360&deg; sull'albero a camme misurando il profilo di alzata. Tempo dipende dalla modalit&agrave; selezionata.">&#9654; START</button>
                <button class="btn btn-danger" onclick="stop();" data-tip="<strong>Interrompi</strong>Ferma la scansione in corso. Dati parziali non vengono salvati. Il prossimo START riparte da zero.">&#10074;&#10074; STOP</button>
                <button class="btn btn-secondary" onclick="location.reload(true);" data-tip="<strong>Reset completo</strong>Ricarica la pagina e azzera tutto: grafico, contatori, posizione encoder.">&#8634; RESET</button>
            </div>

            <div class="separator"></div>

            <div class="controls-group">
                <span class="toggle-label">Modalit&agrave;</span>
                <select id="scanMode" class="input" style="width:230px;" onchange="onScanModeChange();" data-tip="<strong>Modalit&agrave; di scansione</strong>Definisce densit&agrave; di campionamento, settle delay e numero di campioni per ogni grado camma. Modalit&agrave; alte = pi&ugrave; precisione ma scansione pi&ugrave; lunga.">
                    <option value="fast" selected>Veloce &middot; ~1m (stradale)</option>
                    <option value="std">Standard &middot; ~2m (mediana 3)</option>
                    <option value="race">Race &middot; ~5m (0.5&deg; + settle 80ms)</option>
                    <option value="ultra">Ultra &middot; ~7m30s (max precisione)</option>
                    <option value="hyper">Hyper &middot; ~10m (8 sub/&deg;)</option>
                    <option value="atomic">Atomic &middot; ~36m (passo motore minimo)</option>
                </select>
                <span class="help-icon" data-tip="<strong>Quale scegliere?</strong><b>Veloce</b>: cammette stradali, verifica rapida. <b>Standard</b>: default per profili stradali. <b>Race</b>: camme da competizione (alzate &gt; 10mm). <b>Ultra/Hyper/Atomic</b>: solo per studi metrologici, sensibili al rumore." tabindex="0">?</span>
            </div>

            <div class="separator"></div>

            <div class="controls-group">
                <span class="toggle-label">Ripetizioni</span>
                <select id="scanRepeat" class="input" style="width:170px;" data-tip="<strong>Scansioni ripetute</strong>Ripete N volte la stessa scansione e calcola media + deviazione standard per ogni grado camma. Utile per stimare la ripetibilit&agrave; del sistema o ridurre il rumore di misura. Il file salvato contiene la media."><option value="1" selected>1 (singola)</option><option value="2">2 run + medie</option><option value="3">3 run + medie</option><option value="5">5 run + statistiche</option></select>
                <span class="help-icon" data-tip="<strong>Quando ripetere?</strong>Stesso albero, stessa modalit&agrave;: dovresti ottenere la stessa curva. Se la dev. std. &egrave; alta (&gt; 5%), il sistema ha rumore meccanico/elettronico da indagare. Tempo totale = N × tempo singolo." tabindex="0">?</span>
            </div>

            <div class="separator"></div>

            <div class="controls-group">
                <span class="toggle-label">Profilo</span>
                <select id="moveProfile" class="input" style="width:170px;" onchange="onMoveProfileChange();" data-tip="<strong>Profilo movimento stepper</strong>Controlla quanto &egrave; morbida la partenza/arrivo di ogni passo. Riduce vibrazioni meccaniche e risonanze del treno motore→albero. Pi&ugrave; morbido = pi&ugrave; lento (50-80% in pi&ugrave;) ma curva pi&ugrave; pulita.">
                    <option value="0">Scattoso (rapido)</option>
                    <option value="1" selected>Standard</option>
                    <option value="2">Morbido</option>
                    <option value="3">Extra-morbido (silenzioso)</option>
                </select>
                <span class="help-icon" data-tip="<strong>Anti-vibrazione</strong><b>Scattoso</b>: comportamento originale, max velocit&agrave;. Vibra a basse RPM.<br><b>Standard</b>: rampa accelerazione 4 step, +60% tempo, vibrazioni dimezzate. Consigliato per acquisizione.<br><b>Morbido</b>: rampa 8 step + pulse 120μs. Per camme delicate o sistemi rigidi che propagano risonanze.<br><b>Extra-morbido</b>: rampa 16 step + pulse 180μs. Per cogliere ogni dettaglio metrologico, sacrifica velocit&agrave;." tabindex="0">?</span>
            </div>

            <div class="separator"></div>

            <form name="mas">
                <input type="text" name="mas" value=" max" readonly class="max-display" data-tip="<strong>Picco rilevato</strong>Grado camma e alzata mm del punto massimo durante la scansione in corso.">
            </form>

            <div class="separator"></div>

            <div class="controls-group">
                <input type="text" id="nome" placeholder="nome file" class="input" data-tip="<strong>Nome file</strong>Suffisso '_alz' viene aggiunto automaticamente. Es: 'duc916_a' &rarr; 'duc916_a_alz'.">
                <input type="submit" value="Salva" class="btn btn-accent" onclick="sav();">
            </div>
            <form name="salva" style="display:inline;">
                <input type="text" name="salva" readonly class="status-text" style="background:transparent;border:none;" size="12">
            </form>
        </div>

        <!-- Progress bar scansione (attivata da startflag, gestita da cammesScanProgress.set) -->
        <div id="scan-progress-wrap" class="scan-progress-wrap" aria-live="polite">
            <span class="scan-progress-label">Scansione</span>
            <div class="scan-progress-bar">
                <div id="scan-progress-fill" class="scan-progress-fill"></div>
            </div>
            <span id="scan-progress-pct" class="scan-progress-pct">0%</span>
            <span id="scan-progress-eta" class="scan-progress-eta"></span>
        </div>
    </div>

    <!-- Manual rotation -->
    <div class="card">
        <div class="card-title">Rotazione manuale e zero</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-secondary btn-sm" onclick="m1();" data-tip="<strong>-1&deg;</strong>Ruota indietro di 1 grado camma.">&#8722;</button>
                <input type="text" name="step" placeholder="gradi" id="step" class="input" style="width:120px;" data-tip="<strong>Posizione target</strong>Inserisci il grado camma assoluto desiderato, poi premi Ruota.">
                <button class="btn btn-secondary btn-sm" onclick="p1();" data-tip="<strong>+1&deg;</strong>Ruota avanti di 1 grado camma.">+</button>
                <button class="btn btn-accent" id="cf" onclick="ruota();" data-tip="<strong>Ruota a target</strong>Sposta l'albero alla posizione angolare scritta nel campo a sinistra.">Ruota</button>
            </div>

            <div class="separator"></div>

            <button class="btn btn-secondary" id="msBtn" onclick="ms();" data-tip="<strong>Zero virtuale</strong>Esegue una scansione completa, trova il picco di alzata e ruota il motore di +180&deg; rispetto al picco. Cos&igrave; il punto di riferimento &egrave; identico per ogni albero misurato, indipendentemente da come l'hai montato. Tempo: pari a una scansione completa nella modalit&agrave; selezionata.">
                &#9678; Zero virtuale
            </button>

            <div class="separator"></div>

            <button class="btn btn-secondary" id="freeBtn" onclick="toggleMotorFree();" data-tip="<strong>Sblocca motore</strong>Disattiva la corrente dello stepper: l'albero diventa libero e pu&ograve; essere ruotato a mano. Encoder e comparatore continuano a leggere LIVE, cos&igrave; vedi posizione angolare e alzata in tempo reale mentre giri. Utile per ispezione manuale o posizionamento esatto. Premi di nuovo per riattivare il motore prima di scansionare.">
                &#128275; Sblocca motore
            </button>
            <span id="motorFreeBadge" class="motor-free-badge" style="display:none;" title="Motore disattivato: girare l'albero manualmente">&#9679; MOTORE LIBERO</span>

            <button class="btn btn-secondary" id="musicBtn" onclick="openMusicPlayer();" data-tip="<strong>Suona col motore!</strong>Easter egg: lo stepper vibra a frequenza musicale e produce note. Scegli una canzone e ascolta il motore cantarla. Funziona modulando la velocit&agrave; di rotazione: 440 step/sec = La (440 Hz). Tieni l'albero a vista — alterna direzione automaticamente per non scappare.">
                &#127925; Suona
            </button>

            <div class="separator"></div>

            <div class="toggle-group">
                <label class="switch" data-tip="<strong>Senso di rotazione</strong>Inverte il senso del motore. Utile se hai montato la camma al contrario o se vuoi misurare profili in entrambe le direzioni.">
                    <input type="checkbox" onchange="rlb();">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="rlabel">senso orario</span>
            </div>
        </div>
    </div>

</div>

<script>
// Gauge moderno SVG (sostituisce gauge.min.js 2014). Tema-aware: colori dai
// CSS custom properties di style.css. API: gaugemicrom.setValue(v).
var gaugemicrom = (window.cammesGauge && window.cammesGauge.create)
    ? window.cammesGauge.create('microm', {
        min: 0, max: 25, size: 260, unit: 'mm', decimals: 2,
        majorTicks: 10, minorTicksBetween: 4
      })
    : null;
// Fallback se cammesGauge è assente o l'elemento manca: stub no-op che
// previene errori sui setter più sotto (gaugemicrom.value = ...).
if (!gaugemicrom) {
    console.warn('cammesGauge non disponibile, uso stub no-op');
    gaugemicrom = { setValue: function () {}, destroy: function () {} };
}
// Shim retro-compat: alcuni vecchi snippet potrebbero leggere/scrivere
// gaugemicrom.value direttamente. Non più necessario, ma innocuo.
gaugemicrom.draw = function () {};
Object.defineProperty(gaugemicrom, 'value', {
    set: function (v) { gaugemicrom.setValue(v); },
    get: function () { return 0; }
});
</script>

<script>
var msgold = "***";
var oldg = 0;
var maxg = 0;
var max = 0;
var k = 0;
var pdata = new Array();
var pdindex = new Array();
var msg = "";
var startflag = 0;
var stepflag = 0;
var i = 0;
var maxg_encoder       = null;   // conteggio encoder al momento del picco (per 0 virtuale)
var currentEncoderCount = null;   // ultimo conteggio encoder ricevuto (con la misura)

// Modalità scansione: ogni preset definisce campioni media, micropassi per unità,
// passo motore totale per coprire 360° camma e quante letture aggregare per ogni
// grado camma (subStepsPerDeg). Per modalità ad alta densità il file di output
// resta a 360 punti, ottenuti come media di subStepsPerDeg letture vicine.
// settleMs = pausa dopo ogni movimento prima di leggere il sensore (firmware).
// Smorza le vibrazioni meccaniche del puntalino del comparatore. Più alto =
// curva di alzata più pulita ma scansione più lenta.
var SCAN_MODES = {
    fast:   { samples: 1, microsteps: 32, totalSteps: 360,   subStepsPerDeg: 1,  settleMs: 30,  label: 'Veloce',   timeSec: 60   },
    std:    { samples: 3, microsteps: 32, totalSteps: 360,   subStepsPerDeg: 1,  settleMs: 50,  label: 'Standard', timeSec: 130  },
    race:   { samples: 3, microsteps: 16, totalSteps: 720,   subStepsPerDeg: 2,  settleMs: 80,  label: 'Race',     timeSec: 280  },
    ultra:  { samples: 5, microsteps: 16, totalSteps: 720,   subStepsPerDeg: 2,  settleMs: 120, label: 'Ultra',    timeSec: 450  },
    hyper:  { samples: 1, microsteps: 4,  totalSteps: 2880,  subStepsPerDeg: 8,  settleMs: 50,  label: 'Hyper',    timeSec: 600  },
    atomic: { samples: 1, microsteps: 1,  totalSteps: 11520, subStepsPerDeg: 32, settleMs: 30,  label: 'Atomic',   timeSec: 2160 }
};
var currentMode = SCAN_MODES.fast;
// Buffer di accumulo per modalità ad alta densità (chiave = grado camma 1..360)
var subBuffer = {};
// ETA tracker condiviso fra start() / ms() / stop()
var scanEta = window.cammesEta ? window.cammesEta.create() : { start:function(){return this;}, tick:function(){return null;}, stop:function(){} };

// Scansione ripetuta: target N run, contatore corrente, buffer dati per run.
// Quando target > 1, alla fine di ogni run il sistema riparte automaticamente.
// A fine ultimo run, calcola media + std dev per ogni grado camma 1..360.
var repeatRunsTarget = 1;
var repeatRunsDone   = 0;
var repeatedRuns     = [];   // Array di Array[1..360] (pdata di ciascun run)

function onScanModeChange() {
    var sel = document.getElementById('scanMode');
    if (!sel) return;
    currentMode = SCAN_MODES[sel.value] || SCAN_MODES.fast;
    if (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1) {
        sendSocket.send('c' + currentMode.samples + '\n');
        sendSocket.send('r' + currentMode.microsteps + '\n');
        sendSocket.send('w' + currentMode.settleMs + '\n');
    }
}

// Profilo movimento (anti-vibrazione): manda 'kN' al firmware che setta
// pulse width + step rampa + extra delay. Default = standard (k1).
function onMoveProfileChange() {
    var sel = document.getElementById('moveProfile');
    if (!sel) return;
    var v = parseInt(sel.value, 10);
    if (isNaN(v) || v < 0 || v > 3) v = 1;
    if (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1) {
        try { sendSocket.send('k' + v + '\n'); } catch (e) {}
    }
}

// Status indicators state
var lastSensorRx     = 0;   // timestamp ultima misura numerica VALIDA
var lastSensorAnyRx  = 0;   // timestamp ultima risposta dal firmware (anche NaN)
var lastEncoderRx    = 0;
var consecutiveNaN   = 0;   // contatore NaN consecutivi → auto-stop scan
var SENSOR_FRESH_MS    = 3000;
var SENSOR_DEAD_MS     = 5000;   // oltre questo: rosso (nessun frame dal firmware)
var ENCODER_FRESH_MS   = 8000;
var NAN_TO_AUTOSTOP    = 3;

function updateStatusLeds() {
    var ledSrv = document.getElementById('ledServer');
    var ledSen = document.getElementById('ledSensor');
    var ledEnc = document.getElementById('ledEncoder');
    if (!ledSrv) return;
    var wsOk = (typeof engineSocket !== 'undefined' && engineSocket.readyState === 1) &&
               (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1);
    var now = Date.now();
    ledSrv.className = 'led ' + (wsOk ? 'ok' : 'err');
    // Sensore: verde se misure valide fresche, giallo se NaN o nessuna misura valida ma firmware risponde, rosso se firmware morto
    var senClass = '';
    if (lastSensorAnyRx === 0)                            senClass = '';        // mai ricevuto nulla
    else if ((now - lastSensorAnyRx) > SENSOR_DEAD_MS)    senClass = 'err';     // firmware non risponde
    else if ((now - lastSensorRx) > SENSOR_FRESH_MS)      senClass = 'warn';    // sensore scollegato (NaN)
    else                                                  senClass = 'ok';      // tutto bene
    ledSen.className = 'led ' + senClass;
    var encOk = (now - lastEncoderRx) < ENCODER_FRESH_MS;
    ledEnc.className = 'led ' + (encOk ? 'ok' : (lastEncoderRx === 0 ? '' : 'warn'));
}
setInterval(updateStatusLeds, 700);

// Probe periodico in idle:
// - sensore a 5 Hz (200 ms) → display alzata "real-time" anche fuori scansione
// - encoder a 0.2 Hz (5 s) → basta per LED + posizione assoluta
// Disattivati durante scansione attiva (startflag==1) per non interferire.
// Gli handle sono memorizzati così che ms()/start() possano fermarli
// completamente prima di emettere un comando finale ($+units di 0V),
// liberando la coda WebSocket dai messaggi di polling accodati.
var pollEncoderId = setInterval(function() {
    if (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1
        && (typeof startflag === 'undefined' || startflag !== 1)) {
        try { sendSocket.send('?'); } catch(e) {}
    }
}, 5000);
var pollSensorId = setInterval(function() {
    if (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1
        && (typeof startflag === 'undefined' || startflag !== 1)) {
        try { sendSocket.send('m'); } catch(e) {}
    }
}, 200);

var engineSocket = new WebSocket("ws://localhost:8080");

engineSocket.onopen = function(event) {
    document.imp2.imp2.value = "  gradi  " + "0";
    document.cpot.cpot.value = " " + "00.00";
    gaugemicrom.value = 0;
    gaugemicrom.draw();
    sendSocket = new WebSocket("ws://localhost:8080");
    // Allinea la config Arduino alla modalità corrente del browser appena
    // sendSocket è pronto. Senza questo, dopo un reload la config Arduino
    // resta quella dell'ultima sessione e $+N a fine 0 virtuale può finire
    // con scaling sbagliato (es. 180° browser ↔ 5° camma se r=1 residuo).
    sendSocket.onopen = function() {
        try {
            sendSocket.send('c' + currentMode.samples + '\n');
            sendSocket.send('r' + currentMode.microsteps + '\n');
            sendSocket.send('w' + currentMode.settleMs + '\n');
            // Invia anche il profilo movimento corrente (default k1=standard)
            var moveSel = document.getElementById('moveProfile');
            if (moveSel) sendSocket.send('k' + (parseInt(moveSel.value, 10) || 1) + '\n');
            // Ping immediato sensore + encoder per accendere subito i LED
            // (senza aspettare il prossimo tick di polling).
            setTimeout(function(){
                try { sendSocket.send('m'); } catch(e) {}
                try { sendSocket.send('?'); } catch(e) {}
            }, 100);
        } catch (e) { console.warn('Config sync fallito:', e); }
    };
    msgold = "***";
};

engineSocket.onmessage = function(event) {
    msg = event.data;

    // Ack di fine movimento ($+/$- terminato dal firmware): se stiamo
    // attendendo per un 0 virtuale, il motore ha appena finito il
    // sfasamento → possiamo ricaricare la pagina in sicurezza.
    if (msg === '*mv' && window._waiting_mv) {
        window._waiting_mv = false;
        clearTimeout(window._mv_fallback);
        if (window.CAMMES_DEBUG) console.log('[0V] *mv ricevuto, reload pagina');
        setTimeout(function(){ location.reload(true); }, 200);
        return;
    }

    // Riconosce le misure del sensore Neoteck. Il firmware nuovo emette
    // due varianti:
    //   "X.XX"        — misura solo (risposta a 'm', tab idle)
    //   "X.XX N"      — misura + conteggio encoder cumulativo (risposta a p/q)
    //                   N è int (anche negativo). Il browser estrae:
    //                   * msgMeasure = parte misura (per display/gauge/pdata)
    //                   * msgEncoder = N (per associare a maxg in 0V)
    var spIdx = msg.indexOf(' ');
    var msgEncoder = null;
    if (spIdx > 0) {
        var headPart = msg.substring(0, spIdx);
        var tailPart = msg.substring(spIdx + 1);
        if (/^-?\d+(\.\d+)?$|^NaN$/.test(headPart) && /^-?\d+$/.test(tailPart)) {
            msgEncoder = parseInt(tailPart, 10);
            currentEncoderCount = msgEncoder;
            msg = headPart;  // d'ora in poi msg è solo la misura
        }
    }
    var isNumericMeasure = /^-?\d+(\.\d+)?$|^NaN$/.test(msg);

    // Tracking timestamps per indicatori stato sensori
    if (isNumericMeasure) {
        lastSensorAnyRx = Date.now();
        if (msg !== 'NaN') {
            lastSensorRx = Date.now();
            consecutiveNaN = 0;
        } else {
            consecutiveNaN++;
        }
    }
    if (msg.indexOf('encoder=') >= 0 || msg === '*pos') {
        lastEncoderRx = Date.now();
        // Durante free-spin (motore sbloccato) mostra il grado encoder
        // LIVE nel display imp2 (sostituisce il contatore di scansione
        // che non avanza più). Format atteso: "encoder=N deg=XX.XX"
        if (motorFree) {
            var mDeg = msg.match(/deg=(-?\d+(\.\d+)?)/);
            if (mDeg) {
                document.imp2.imp2.value = '  enc ' + parseFloat(mDeg[1]).toFixed(2) + '°';
            }
        }
    }

    if (isNumericMeasure) {
        var n = Number(msg);
        if (Number(msg) < 10) { msg2 = "0" + msg; }
        else { msg2 = msg; }

        if (n >= 0 && n < 32) {
            document.cpot.cpot.value = " " + msg2;
            gaugemicrom.value = msg;
            gaugemicrom.draw();
        } else {
            msg = "0.00";
            document.cpot.cpot.value = "NO SENSORE";
            // Auto-stop scan dopo N NaN consecutivi
            if (typeof startflag !== 'undefined' && startflag === 1 && consecutiveNaN >= NAN_TO_AUTOSTOP) {
                startflag = 0;
                if (typeof stop === 'function') { try { stop(); } catch(e) {} }
                console.warn('Auto-stop scan: sensore non risponde (' + consecutiveNaN + ' NaN consecutivi)');
            }
        }

        if (startflag === 1 && i <= currentMode.totalSteps && stepflag === 0) {
            // Bin angolare 1..360 (grado camma reale). Se subStepsPerDeg>1 aggreghiamo
            // più letture nello stesso bin con media filtrata di NaN.
            var deg = Math.floor((i - 1) / currentMode.subStepsPerDeg) + 1;
            if (deg < 1) deg = 1;
            if (deg > 360) deg = 360;
            var v = Number(msg);
            if (currentMode.subStepsPerDeg <= 1) {
                pdindex[deg] = deg;
                pdata[deg]   = v;
            } else {
                if (!subBuffer[deg]) subBuffer[deg] = [];
                if (!isNaN(v)) subBuffer[deg].push(v);
                if (subBuffer[deg].length >= currentMode.subStepsPerDeg) {
                    var sum = 0;
                    for (var k = 0; k < subBuffer[deg].length; k++) sum += subBuffer[deg][k];
                    pdindex[deg] = deg;
                    pdata[deg]   = sum / subBuffer[deg].length;
                }
            }

            // Tracking massimo (su valore corrente del bin, anche se non ancora chiuso)
            var currentBinVal = (currentMode.subStepsPerDeg <= 1) ? pdata[deg]
                                : (subBuffer[deg] ? subBuffer[deg].reduce(function(a,b){return a+b;}, 0)/subBuffer[deg].length : 0);
            if (currentBinVal > max) {
                max = currentBinVal;
                maxg = deg;
                // Memorizza la posizione encoder REALE al momento del picco.
                // È il riferimento usato dal 0 virtuale per calcolare il
                // sfasamento di +180° in coordinate angolari assolute.
                if (msgEncoder !== null) maxg_encoder = msgEncoder;
            }
            document.mas.mas.value = " max  " + maxg + " gradi       " + max.toFixed(3);

            // Update Chart.js solo quando un bin si chiude (evita lag a 11520 punti)
            if (currentMode.subStepsPerDeg <= 1 ||
                (subBuffer[deg] && subBuffer[deg].length === currentMode.subStepsPerDeg)) {
                config.data.labels.push(deg);
                config.data.datasets.forEach(function(dataset){ dataset.data.push(pdata[deg]); });
                window.myLine.update();
            }
        }
    }

    if (i == currentMode.totalSteps) {
        if (startflag == 1) {
            var x = "sequenza di misura   terminata ";
            responsiveVoice.speak(x, "Italian Female", { volume: 3 });
            if (window.cammesScanProgress) window.cammesScanProgress.set(currentMode.totalSteps, currentMode.totalSteps, 0);
            if (scanEta) scanEta.stop();

            // === Scansione ripetuta: salva questo run e decide se ripartire ===
            if (labms !== 1 && repeatRunsTarget > 1) {
                // Snapshot pdata (deep copy della parte 1..360)
                var snapshot = [];
                for (var d = 1; d <= 360; d++) snapshot[d] = pdata[d];
                snapshot.maxg = maxg; snapshot.max = max;
                repeatedRuns.push(snapshot);
                repeatRunsDone++;

                if (repeatRunsDone < repeatRunsTarget) {
                    // Restart automatico dopo 1.5 s (lascia tempo alle vibrazioni)
                    if (window.cammesToast) {
                        window.cammesToast({
                            kind: 'info', title: 'Run ' + repeatRunsDone + '/' + repeatRunsTarget + ' completato',
                            body: 'Picco ' + max.toFixed(3) + ' mm a ' + maxg + '&deg;. Avvio prossimo run...',
                            duration: 3500
                        });
                    }
                    startflag = 0;
                    setTimeout(function () { _startSingleRun(false); }, 1500);
                    return;
                }

                // === ULTIMO RUN: calcola statistiche su tutti i N run ===
                _showRepeatedRunsStats();
                // Riabilita scanRepeat
                var rs = document.getElementById('scanRepeat'); if (rs) rs.disabled = false;
            } else {
                if (window.cammesToast && labms !== 1) {
                    window.cammesToast({ kind: 'success', title: 'Scansione completata', body: 'Picco ' + max.toFixed(3) + ' mm a ' + maxg + '&deg; camma.', duration: 5000 });
                }
            }
            // Riabilita selector modalità a fine scansione
            var sm = document.getElementById('scanMode'); if (sm) sm.disabled = false;
        }
        startflag = 0;

        if (labms == 1) {
            // 0 virtuale BASATO SU ENCODER: la camma viene portata a una
            // posizione assoluta tale che il picco sia a +180° dallo zero
            // di scansione, usando il conteggio encoder REALE registrato al
            // momento del picco (immune a backlash, slittamenti, errori
            // cumulativi del contatore di scansione).
            //
            // Encoder: 4 conteggi = 1° camma. 180° = 720 conteggi.
            //
            // target_encoder = maxg_encoder + 720 (conteggi assoluti)
            // delta_count    = target_encoder − currentEncoderCount
            // delta_deg      = delta_count / 4
            // delta_units    = delta_deg × currentMode.subStepsPerDeg
            //                  (1 unità motore = 1/subStepsPerDeg gradi camma)
            //
            // Comando inviato: $+delta_units oppure $-|delta_units|
            // a seconda del segno.
            if (maxg_encoder === null || currentEncoderCount === null) {
                if (window.CAMMES_DEBUG) console.warn('[0V] dati encoder mancanti (maxg_encoder=' + maxg_encoder + ', current=' + currentEncoderCount + '), abort 0V');
                labms = 0;
                location.reload(true);
            } else {
                var encoderTarget = maxg_encoder + 720;  // +180° in conteggi encoder x4
                var rawDelta      = encoderTarget - currentEncoderCount;
                // Modulo 360° (1440 conteggi): posizioni fisiche equivalenti.
                // Scegliamo il movimento più corto fra +Δ e -Δ per evitare di
                // far girare il motore di un giro intero in più (più backlash).
                var deltaCount = ((rawDelta % 1440) + 1440) % 1440;  // 0..1439
                if (deltaCount > 720) deltaCount -= 1440;             // -719..720
                var deltaDeg   = deltaCount / 4;
                var deltaUnits = Math.round(deltaDeg * currentMode.subStepsPerDeg);
                var sign          = (deltaUnits >= 0) ? '+' : '-';
                var absUnits      = Math.abs(deltaUnits);
                var rgradi        = (absUnits < 10) ? '00' + absUnits
                                  : (absUnits < 100) ? '0' + absUnits
                                  : '' + absUnits;
                var rgradi2       = '$' + sign + rgradi;
                if (window.CAMMES_DEBUG) console.log('[0V] picco encoder=' + maxg_encoder + ' (=' + (maxg_encoder/4).toFixed(2) + '°), target=' + encoderTarget + ' (=' + (encoderTarget/4).toFixed(2) + '°), now=' + currentEncoderCount + ', delta_raw=' + rawDelta + ' cnt → short=' + deltaCount + ' cnt = ' + deltaDeg.toFixed(2) + '° = ' + deltaUnits + ' units. cmd="' + rgradi2 + '"');
                sendSocket.send(rgradi2 + '\n');
                oldg = absUnits;
                var stepEl = document.getElementById("step");
                if (stepEl) stepEl.value = oldg;
                labms = 0;
                window._waiting_mv  = true;
                window._mv_fallback = setTimeout(function(){
                    if (window._waiting_mv) {
                        if (window.CAMMES_DEBUG) console.warn('[0V] timeout fallback 8s, reload forzato');
                        window._waiting_mv = false;
                        location.reload(true);
                    }
                }, 8000);
            }
        }
    }

    // Avanza alla prossima misura SOLO se siamo in una scansione attiva (startflag==1)
    // e il terminatore è quello di una misura (*se), non altri (*pos / *zero / *dbg).
    if (msg === '*se') {
        // visualizza progresso in gradi camma reali (i sub-step ÷ subStepsPerDeg)
        var degShown = (i / currentMode.subStepsPerDeg).toFixed(2);
        document.imp2.imp2.value = "  gradi  " + degShown;
        // Aggiorna progress bar + ETA solo durante scansione attiva.
        if (startflag === 1 && window.cammesScanProgress) {
            var etaSec = scanEta.tick(i);
            window.cammesScanProgress.set(i, currentMode.totalSteps, etaSec);
        }
        if (startflag == 1 && i < currentMode.totalSteps && stepflag == 0) {
            if (rsign == 1) { sendSocket.send('p'); }
            if (rsign == -1) { sendSocket.send('q'); }
            i = i + 1;
        }
    }
};
</script>

<script>
var i = 0;
function start() {
    // Legge target ripetizioni dalla UI all'avvio (poi non cambia per la
    // durata del ciclo completo: l'utente non può cambiarlo mid-sequence
    // perché disabilitiamo lo scanRepeat).
    var repSel = document.getElementById('scanRepeat');
    repeatRunsTarget = repSel ? parseInt(repSel.value, 10) || 1 : 1;
    repeatRunsDone   = 0;
    repeatedRuns     = [];
    if (repSel) repSel.disabled = true;
    _startSingleRun(/*firstRun=*/true);
}
// Calcola statistiche su tutti i run ripetuti accumulati in
// repeatedRuns[]. Sostituisce pdata corrente con la MEDIA per grado
// (così il save mantiene un file pulito) e mostra picco + std dev max +
// coefficiente di variazione massimo come indicatori di ripetibilità.
function _showRepeatedRunsStats() {
    var N = repeatedRuns.length;
    if (N < 2) return;
    var sumLift = 0, peakStdAtMaxg = 0, maxStd = 0, maxStdDeg = 0, maxCv = 0;
    var avgLift = new Array(361), stdLift = new Array(361);
    for (var d = 1; d <= 360; d++) {
        var sum = 0, count = 0;
        for (var r = 0; r < N; r++) {
            var v = repeatedRuns[r][d];
            if (typeof v === 'number' && !isNaN(v)) { sum += v; count++; }
        }
        var mean = count > 0 ? sum / count : 0;
        var sq = 0;
        for (var r2 = 0; r2 < N; r2++) {
            var v2 = repeatedRuns[r2][d];
            if (typeof v2 === 'number' && !isNaN(v2)) sq += (v2 - mean) * (v2 - mean);
        }
        var sd = count > 1 ? Math.sqrt(sq / (count - 1)) : 0;
        avgLift[d] = mean;
        stdLift[d] = sd;
        if (sd > maxStd) { maxStd = sd; maxStdDeg = d; }
        if (mean > 0.3 && sd / mean * 100 > maxCv) maxCv = sd / mean * 100;
    }

    // Calcola maxg da media e std al picco
    var maxAvg = 0, maxAvgDeg = 0;
    for (var dd = 1; dd <= 360; dd++) {
        if (avgLift[dd] > maxAvg) { maxAvg = avgLift[dd]; maxAvgDeg = dd; }
    }
    peakStdAtMaxg = stdLift[maxAvgDeg] || 0;

    // Sostituisci pdata con la media (per save coerente). Aggiorna anche
    // il chart e i contatori max/maxg in UI.
    for (var dd2 = 1; dd2 <= 360; dd2++) {
        pdata[dd2]   = avgLift[dd2];
        pdindex[dd2] = dd2;
    }
    max = maxAvg; maxg = maxAvgDeg;
    document.mas.mas.value = " max  " + maxg + " gradi       " + max.toFixed(3) + " (n=" + N + ")";

    if (config && config.data) {
        config.data.labels.length = 0;
        config.data.datasets.forEach(function (d) { d.data.length = 0; });
        for (var dd3 = 1; dd3 <= 360; dd3++) {
            config.data.labels.push(dd3);
            config.data.datasets[0].data.push(avgLift[dd3]);
        }
        if (window.myLine) try { window.myLine.update(); } catch (e) {}
    }

    // Toast riepilogo con verdict ripetibilità
    var verdict, kind;
    if (maxCv < 1)        { verdict = 'eccellente'; kind = 'success'; }
    else if (maxCv < 3)   { verdict = 'buona';      kind = 'success'; }
    else if (maxCv < 7)   { verdict = 'sufficiente'; kind = 'warn'; }
    else                  { verdict = 'scadente';   kind = 'err'; }
    if (window.cammesToast) {
        window.cammesToast({
            kind: kind, title: N + ' run completati &middot; ripetibilit&agrave; ' + verdict,
            body: 'Picco medio <b>' + maxAvg.toFixed(3) + ' mm</b> a <b>' + maxAvgDeg +
                  '&deg;</b> &middot; &sigma; max <b>' + maxStd.toFixed(3) + ' mm</b> @ ' + maxStdDeg +
                  '&deg; &middot; CV max <b>' + maxCv.toFixed(2) + '%</b>',
            duration: 9000
        });
    }
}

// Avvia un singolo run di scansione. Usato sia dal primo start() che
// dall'auto-restart dopo che un run è completato in modalità ripetuta.
function _startSingleRun(firstRun) {
    var x = "sequenza di misura   iniziata ";
    responsiveVoice.speak(x, "Italian Female", { volume: 3 });
    var sm = document.getElementById('scanMode'); if (sm) sm.disabled = true;
    i = 0;
    consecutiveNaN = 0;
    subBuffer = {};
    pdata.length = 0; pdindex.length = 0;
    max = 0; maxg = 0; maxg_encoder = null;
    if (config && config.data) { config.data.labels.length = 0; config.data.datasets.forEach(function(d){ d.data.length = 0; }); }
    if (window.myLine) { try { window.myLine.update(); } catch(e) {} }
    i = i + 1;
    document.imp2.imp2.value = "  gradi  " + (i / currentMode.subStepsPerDeg).toFixed(2);
    if (rsign == 1) { sendSocket.send('p'); }
    if (rsign == -1) { sendSocket.send('q'); }
    stepflag = 0;
    startflag = 1;
    scanEta.start(currentMode.totalSteps);
    if (window.cammesScanProgress) window.cammesScanProgress.set(0, currentMode.totalSteps, currentMode.timeSec);
    if (window.cammesToast) {
        var runLabel = repeatRunsTarget > 1
            ? 'Run ' + (repeatRunsDone + 1) + '/' + repeatRunsTarget + ' &middot; ' + currentMode.label
            : 'Modalit&agrave; ' + currentMode.label + ' &middot; ~' + Math.round(currentMode.timeSec/60) + 'm';
        window.cammesToast({
            kind: 'info',
            title: firstRun ? 'Scansione avviata' : 'Prossimo run avviato',
            body: runLabel,
            duration: 2500
        });
    }
}
</script>

<script>
var stepflag = 0;
function stop() {
    // Ferma definitivamente la scansione: il prossimo START riparte da zero.
    // Niente più toggle implicito: per riprendere dallo stesso punto va
    // creato in futuro un bottone RIPRENDI dedicato.
    stepflag  = 1;
    startflag = 0;
    labms     = 0;     // annulla anche un eventuale 0 virtuale in corso
    // Riabilita selector modalità e ripetizioni
    var sm = document.getElementById('scanMode'); if (sm) sm.disabled = false;
    var rs = document.getElementById('scanRepeat'); if (rs) rs.disabled = false;
    // Cancella eventuale sequenza ripetuta in corso
    repeatRunsTarget = 1;
    repeatRunsDone = 0;
    repeatedRuns = [];
    if (scanEta) scanEta.stop();
    if (window.cammesScanProgress) window.cammesScanProgress.reset();
    if (window.cammesToast) window.cammesToast({ kind: 'warn', title: 'Scansione interrotta', body: 'I dati parziali non sono stati salvati.', duration: 3000 });
}
</script>

<script>
var stringa = "";
function sav() {
    var nameEl = document.getElementById("nome");
    var rawName = (nameEl && nameEl.value || '').trim();
    if (!rawName) {
        if (window.cammesValidate) window.cammesValidate.error(nameEl, 'Inserisci un nome file prima di salvare.');
        else alert('Inserisci un nome file');
        return;
    }
    if (!pdindex || pdindex.length < 2) {
        if (window.cammesToast) window.cammesToast({ kind: 'warn', title: 'Nessun dato', body: 'Esegui una scansione prima di salvare.', duration: 3000 });
        return;
    }
    // Sanifica nome (no spazi/caratteri non sicuri per filesystem)
    var safeName = rawName.replace(/[^A-Za-z0-9_\-]/g, '_');
    stringa = "";
    for (t = 1; t < pdindex.length; t++) {
        stringa = stringa + pdindex[t] + "," + pdata[t] + "\r\n";
    }
    var fname = safeName + "_alz";
    var stringa2 = "*" + fname + "*" + "_pline" + "\r\n" + stringa;
    sendSocket.send(stringa2);
    document.salva.salva.value = " file salvato";
    if (window.cammesToast) window.cammesToast({ kind: 'success', title: 'File salvato', body: fname + '.scr in cartella prove/.', duration: 4000 });
}
</script>

<script>
var dif = 0;
function ruota() {
    var dg = document.getElementById("step").value;
    var w = "rotazione a   " + dg + " gradi  attivata";
    responsiveVoice.speak(w, "Italian Female", { volume: 3 });

    if (dg - oldg < 0) {
        dif = -(dg - oldg);
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 && dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$-" + (dif); }
        if (rsign == -1) { crot = "$+" + (dif); }
    }
    if (dg - oldg > 0) {
        dif = dg - oldg;
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 && dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$+" + (dif); }
        if (rsign == -1) { crot = "$-" + (dif); }
    }
    if (dg - oldg != 0) { sendSocket.send(crot + '\n'); }
    oldg = dg;
}
</script>

<script>
var labms = 0;
function ms() {
    // Ferma SUBITO i polling: la coda WebSocket deve essere libera
    // quando il blocco di fine 0V invierà '$+units'. Senza questo,
    // i 'm' di polling accodati possono ritardare la trasmissione del
    // comando finale oltre il momento del location.reload().
    clearInterval(pollSensorId);
    clearInterval(pollEncoderId);
    // Disabilita selector modalità: cambiare modalità in mezzo alla
    // scansione cambierebbe currentMode.subStepsPerDeg e farebbe
    // calcolare un 'units' sbagliato a fine scansione.
    var sm = document.getElementById('scanMode'); if (sm) sm.disabled = true;
    i = 0;
    labms = 1;
    max = 0;
    maxg = 0;
    document.mas.mas.value = " max  " + maxg + " gradi" + "       " + max;
    reset();
    start();
}

<script>
// ===== Motore libero (free-spin) =====
// Quando attivato: invia 'f' al firmware (PIN_ENA = LOW), il motore
// è senza corrente e può essere ruotato a mano. Encoder + sensore
// continuano a funzionare con polling accelerato per visualizzazione
// LIVE durante la rotazione manuale. Bottoni di movimento disabilitati.
var motorFree = false;
var pollFreeSensorId = null;
var pollFreeEncoderId = null;

function toggleMotorFree() {
    motorFree = !motorFree;
    var btn   = document.getElementById('freeBtn');
    var badge = document.getElementById('motorFreeBadge');
    if (motorFree) {
        // SBLOCCA
        try { sendSocket.send('f\n'); } catch (e) {}
        if (btn)   btn.innerHTML = '&#128274; Blocca motore';
        if (btn)   btn.classList.add('btn-warn');
        if (badge) badge.style.display = 'inline-flex';
        _setMotionUiDisabled(true);

        // Stop polling normale (5s/200ms) e attivo polling LIVE (100ms/100ms)
        try { clearInterval(pollEncoderId); } catch (e) {}
        try { clearInterval(pollSensorId);  } catch (e) {}
        pollFreeEncoderId = setInterval(function () {
            if (sendSocket && sendSocket.readyState === 1)
                try { sendSocket.send('?'); } catch (e) {}
        }, 200);
        pollFreeSensorId = setInterval(function () {
            if (sendSocket && sendSocket.readyState === 1)
                try { sendSocket.send('m'); } catch (e) {}
        }, 100);

        if (window.cammesToast) window.cammesToast({
            kind: 'info', title: 'Motore sbloccato',
            body: 'Puoi ruotare l\'albero a mano. Encoder e comparatore leggono live.',
            duration: 3500
        });
    } else {
        // BLOCCA
        try { sendSocket.send('l\n'); } catch (e) {}
        if (btn)   btn.innerHTML = '&#128275; Sblocca motore';
        if (btn)   btn.classList.remove('btn-warn');
        if (badge) badge.style.display = 'none';
        _setMotionUiDisabled(false);

        // Stop polling LIVE e riavvio polling normale
        try { clearInterval(pollFreeEncoderId); } catch (e) {}
        try { clearInterval(pollFreeSensorId);  } catch (e) {}
        pollFreeEncoderId = null;
        pollFreeSensorId  = null;
        pollEncoderId = setInterval(function () {
            if (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1
                && (typeof startflag === 'undefined' || startflag !== 1)) {
                try { sendSocket.send('?'); } catch (e) {}
            }
        }, 5000);
        pollSensorId = setInterval(function () {
            if (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1
                && (typeof startflag === 'undefined' || startflag !== 1)) {
                try { sendSocket.send('m'); } catch (e) {}
            }
        }, 200);

        if (window.cammesToast) window.cammesToast({
            kind: 'success', title: 'Motore bloccato',
            body: 'Stepper in tenuta. Puoi avviare scansioni e rotazioni.',
            duration: 2000
        });
    }
}

// Disabilita/abilita bottoni che muoverebbero il motore (Start, Ruota, +/-, 0V).
// Quando motorFree=true, qualsiasi pulso PUL sarebbe ignorato dal driver e
// scollazerebbe il contatore di scansione.
function _setMotionUiDisabled(disabled) {
    var ids = ['cf', 'msBtn'];
    ids.forEach(function (id) {
        var el = document.getElementById(id); if (el) el.disabled = disabled;
    });
    // Start button (no id) - cerco per testo
    Array.prototype.forEach.call(document.querySelectorAll('button.btn-success'), function (b) {
        if (/START/i.test(b.textContent)) b.disabled = disabled;
    });
    // +/- buttons
    Array.prototype.forEach.call(document.querySelectorAll('.btn-secondary.btn-sm'), function (b) {
        var t = b.textContent.trim();
        if (t === '−' || t === '-' || t === '+' || t === '−') b.disabled = disabled;
    });
}
window.toggleMotorFree = toggleMotorFree;

var rot = 0;
var rsign = 1;
function rlb() {
    rot = rot + 1;
    if (rot == 2) { rot = 0; }
    if (rot == 0) {
        document.getElementById("rlabel").innerHTML = "senso orario";
        rsign = 1;
    }
    if (rot == 1) {
        document.getElementById("rlabel").innerHTML = "senso antiorario";
        rsign = -1;
    }
}
</script>

<!-- ============================================
     Music player: fa cantare lo stepper con la modulazione PUL
     ============================================ -->
<script>
// Tabella frequenze note (A4 = 440 Hz, equal temperament)
var NOTE_HZ = {
    'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61, 'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
    'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23, 'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
    'C5': 523.25, 'D5': 587.33, 'E5': 659.25, 'F5': 698.46, 'G5': 783.99, 'A5': 880.00, 'B5': 987.77,
    // Diesis
    'C#4': 277.18, 'D#4': 311.13, 'F#4': 369.99, 'G#4': 415.30, 'A#4': 466.16,
    'C#5': 554.37, 'D#5': 622.25, 'F#5': 739.99, 'G#5': 830.61, 'A#5': 932.33,
    // Pausa
    '_': 0
};

// Songs: [['nota', durata_relativa], ...]
// Durata 1 = nota base (default 250 ms), si scala col tempo BPM.
var SONGS = {
    imperial_march: {
        title: "Imperial March (Star Wars)",
        baseMs: 350,
        notes: [
            ['A4',1],['A4',1],['A4',1],['F4',0.75],['C5',0.25],
            ['A4',1],['F4',0.75],['C5',0.25],['A4',2],
            ['E5',1],['E5',1],['E5',1],['F5',0.75],['C5',0.25],
            ['G#4',1],['F4',0.75],['C5',0.25],['A4',2]
        ]
    },
    twinkle: {
        title: "Twinkle Twinkle Little Star",
        baseMs: 400,
        notes: [
            ['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],
            ['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2],
            ['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],
            ['G4',1],['G4',1],['F4',1],['F4',1],['E4',1],['E4',1],['D4',2],
            ['C4',1],['C4',1],['G4',1],['G4',1],['A4',1],['A4',1],['G4',2],
            ['F4',1],['F4',1],['E4',1],['E4',1],['D4',1],['D4',1],['C4',2]
        ]
    },
    ode_to_joy: {
        title: "Inno alla Gioia (Beethoven)",
        baseMs: 350,
        notes: [
            ['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],
            ['C4',1],['C4',1],['D4',1],['E4',1],['E4',1.5],['D4',0.5],['D4',2],
            ['E4',1],['E4',1],['F4',1],['G4',1],['G4',1],['F4',1],['E4',1],['D4',1],
            ['C4',1],['C4',1],['D4',1],['E4',1],['D4',1.5],['C4',0.5],['C4',2]
        ]
    },
    happy_birthday: {
        title: "Happy Birthday",
        baseMs: 350,
        notes: [
            ['C4',0.5],['C4',0.5],['D4',1],['C4',1],['F4',1],['E4',2],
            ['C4',0.5],['C4',0.5],['D4',1],['C4',1],['G4',1],['F4',2],
            ['C4',0.5],['C4',0.5],['C5',1],['A4',1],['F4',1],['E4',1],['D4',2],
            ['A#4',0.5],['A#4',0.5],['A4',1],['F4',1],['G4',1],['F4',2]
        ]
    },
    scale: {
        title: "Scala diagnostica (C4→C5)",
        baseMs: 300,
        notes: [
            ['C4',1],['D4',1],['E4',1],['F4',1],['G4',1],['A4',1],['B4',1],['C5',2]
        ]
    }
};

var musicPlaying = false;
var musicCancelToken = 0;

function openMusicPlayer() {
    if (document.getElementById('musicBackdrop')) return;
    var back = document.createElement('div');
    back.id = 'musicBackdrop';
    back.className = 'confirm-backdrop visible';
    var songOptions = Object.keys(SONGS).map(function (k) {
        return '<option value="' + k + '">' + SONGS[k].title + '</option>';
    }).join('');
    back.innerHTML =
        '<div class="confirm-modal" style="max-width:480px;">' +
        '  <div class="confirm-modal-icon" style="background:color-mix(in oklab, var(--accent-3) 18%, transparent);color:var(--accent-3);">' +
        '    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>' +
        '    </svg>' +
        '  </div>' +
        '  <div class="confirm-modal-title">Suona col motore</div>' +
        '  <div class="confirm-modal-body">' +
        '    Lo stepper vibra a frequenza modulata: ad ogni nota corrisponde una velocit&agrave; di rotazione precisa.<br>' +
        '    <b>Tieni d\'occhio l\'albero</b> &mdash; alterna direzione automaticamente per evitare di farlo scappare troppo lontano.' +
        '  </div>' +
        '  <div style="margin:12px 0;">' +
        '    <select id="songSelect" class="input" style="width:100%;">' + songOptions + '</select>' +
        '  </div>' +
        '  <div id="musicNoteDisplay" style="text-align:center;font-family:var(--font-mono);font-size:14px;color:var(--text-muted);min-height:20px;margin-bottom:12px;">&nbsp;</div>' +
        '  <div class="confirm-modal-actions">' +
        '    <button class="btn btn-secondary" onclick="closeMusicPlayer();">Chiudi</button>' +
        '    <button class="btn btn-danger"  id="musicStopBtn" onclick="stopMusic();" style="display:none;">&#9632; Stop</button>' +
        '    <button class="btn btn-accent"  id="musicPlayBtn" onclick="playMusic();">&#9658; Suona</button>' +
        '  </div>' +
        '</div>';
    document.body.appendChild(back);
    back.onclick = function (e) { if (e.target === back) closeMusicPlayer(); };
    document.addEventListener('keydown', _musicEsc);
}
function _musicEsc(e) { if (e.key === 'Escape') closeMusicPlayer(); }
function closeMusicPlayer() {
    stopMusic();
    var b = document.getElementById('musicBackdrop');
    if (b) b.remove();
    document.removeEventListener('keydown', _musicEsc);
}
function stopMusic() {
    musicPlaying = false;
    musicCancelToken++;
    var playBtn = document.getElementById('musicPlayBtn');
    var stopBtn = document.getElementById('musicStopBtn');
    if (playBtn) playBtn.style.display = '';
    if (stopBtn) stopBtn.style.display = 'none';
    var disp = document.getElementById('musicNoteDisplay');
    if (disp) disp.innerHTML = '&nbsp;';
}

function _sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

async function playMusic() {
    if (musicPlaying) return;
    var sel = document.getElementById('songSelect');
    var song = SONGS[sel.value];
    if (!song) return;
    musicPlaying = true;
    var myToken = ++musicCancelToken;
    var playBtn = document.getElementById('musicPlayBtn');
    var stopBtn = document.getElementById('musicStopBtn');
    var disp    = document.getElementById('musicNoteDisplay');
    if (playBtn) playBtn.style.display = 'none';
    if (stopBtn) stopBtn.style.display = '';

    // Alterna direzione ogni 4 note per non scappare dall'origine
    var dirSign = '+';
    for (var i = 0; i < song.notes.length; i++) {
        if (myToken !== musicCancelToken || !musicPlaying) break;
        var noteName = song.notes[i][0];
        var durMul   = song.notes[i][1];
        var noteMs   = Math.round(song.baseMs * durMul * 0.9);  // 10% buffer per separare note
        var gapMs    = Math.max(15, Math.round(song.baseMs * durMul * 0.1));
        var freq     = NOTE_HZ[noteName] || 0;
        if (disp) disp.innerHTML = '<b style="color:var(--accent-3);">' + noteName + '</b> &middot; ' + (freq ? freq.toFixed(0) + ' Hz' : 'pausa') + ' &middot; ' + noteMs + ' ms';

        if (freq > 0) {
            try { sendSocket.send('t' + Math.round(freq) + ':' + noteMs + ':' + dirSign + '\n'); } catch (e) {}
        }
        // Attesa che il firmware finisca + gap
        await _sleep(noteMs + gapMs);
        // Alterna direzione ogni 4 note
        if (i % 4 === 3) dirSign = (dirSign === '+' ? '-' : '+');
    }
    if (musicPlaying && myToken === musicCancelToken) stopMusic();
}

window.openMusicPlayer  = openMusicPlayer;
window.closeMusicPlayer = closeMusicPlayer;
window.playMusic        = playMusic;
window.stopMusic        = stopMusic;
</script>
