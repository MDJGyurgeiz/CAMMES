<!doctype html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>CAMMES - Alzata</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .status-row {
            display: flex; gap: 14px; margin-left: 18px; align-items: center;
            font-family: var(--font-display); font-size: 11px; letter-spacing: 1px;
            text-transform: uppercase; color: var(--text-muted);
        }
        .status-item { display: inline-flex; align-items: center; gap: 6px; }
        .led { width: 9px; height: 9px; border-radius: 50%; background: #555;
               box-shadow: 0 0 0 1px rgba(255,255,255,.05); transition: 0.2s; }
        .led.ok   { background: var(--success); box-shadow: 0 0 8px var(--success-glow); }
        .led.warn { background: var(--warning); box-shadow: 0 0 8px rgba(255,215,64,.5); }
        .led.err  { background: var(--danger);  box-shadow: 0 0 8px var(--danger-glow); }
    </style>
</head>
<body>

<script src="gauge.min.js"></script>
<script src="jquery.min.js"></script>
<script src="responsivevoice.js"></script>

<div class="app-container">

    <!-- Header -->
    <div class="header">
        <img src="images/logo.jpg" alt="CAMMES">
        <h1>CAMMES</h1>
        <div class="status-row">
            <span class="status-item"><span id="ledServer" class="led"></span>Server</span>
            <span class="status-item"><span id="ledSensor" class="led"></span>Sensore</span>
            <span class="status-item"><span id="ledEncoder" class="led"></span>Encoder</span>
        </div>
        <div class="nav-links">
            <a href="alzata.html" class="active">Alzata</a>
            <a href="polare.html">Polare</a>
            <a href="grafici.html">Grafici</a>
            <a href="analisi.html">Analisi</a>
        </div>
    </div>

    <!-- Main content: Gauge + Chart -->
    <div class="main-grid">

        <!-- Left: Gauge -->
        <div class="card gauge-card">
            <div class="card-title">Misura in tempo reale</div>
            <canvas id="microm"></canvas>
            <form name="cpot">
                <input type="text" name="cpot" readonly class="gauge-value">
            </form>
            <form name="imp2">
                <input type="text" name="imp2" readonly class="gauge-degrees">
            </form>
        </div>

        <!-- Right: Chart -->
        <div class="card chart-card">
            <div class="card-title">Profilo Alzata 360°</div>
            <canvas id="grafico" width="900" height="500"></canvas>
        </div>

    </div>

    <!-- Controls -->
    <div class="card">
        <div class="card-title">Controlli</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-success" onclick="start();">&#9654; START</button>
                <button class="btn btn-danger" onclick="stop();">&#10074;&#10074; STOP</button>
                <button class="btn btn-accent" onclick="ms();" title="Scansiona, poi sposta automaticamente la camma a +180° dal picco per allineamento profili">&#127919; 0 VIRTUALE</button>
                <button class="btn btn-secondary" onclick="location.reload(true);">&#8634; RESET</button>
            </div>

            <div class="separator"></div>

            <div class="controls-group">
                <span class="toggle-label">Modalit&agrave;</span>
                <select id="scanMode" class="input" style="width:200px;" onchange="onScanModeChange();">
                    <option value="fast" selected>Veloce &middot; 60s (stradale)</option>
                    <option value="std">Standard &middot; 110s</option>
                    <option value="race">Race &middot; 220s (0.5&deg;)</option>
                    <option value="ultra">Ultra &middot; 350s (0.5&deg; +5x)</option>
                    <option value="hyper">Hyper &middot; 7m30s (8 sub/&deg;)</option>
                    <option value="atomic">Atomic &middot; 30m (passo motore minimo)</option>
                </select>
            </div>

            <div class="separator"></div>

            <form name="mas">
                <input type="text" name="mas" value=" max" readonly class="max-display">
            </form>

            <div class="separator"></div>

            <div class="controls-group">
                <input type="text" id="nome" placeholder="nome file" class="input">
                <input type="submit" value="Salva" class="btn btn-accent" onclick="sav();">
            </div>
            <form name="salva" style="display:inline;">
                <input type="text" name="salva" readonly class="status-text" style="background:transparent;border:none;" size="12">
            </form>
        </div>
    </div>

    <!-- Manual rotation -->
    <div class="card">
        <div class="card-title">Rotazione manuale</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-secondary btn-sm" onclick="m1();">&#8722;</button>
                <input type="text" name="step" placeholder="gradi" id="step" class="input" style="width:120px;">
                <button class="btn btn-secondary btn-sm" onclick="p1();">+</button>
                <button class="btn btn-accent" id="cf" onclick="ruota();">Ruota</button>
            </div>

            <div class="separator"></div>

            <button class="btn btn-secondary" onclick="ms();" title="Zero virtuale">
                &#9678; Zero virtuale
            </button>

            <div class="separator"></div>

            <div class="toggle-group">
                <label class="switch">
                    <input type="checkbox" onchange="rlb();">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="rlabel">senso orario</span>
            </div>
        </div>
    </div>

</div>

     JavaScript - Logica invariata
     ============================================ -->

<script>
// Gauge setup
var gaugemicrom = new RadialGauge({
    renderTo: 'microm',
    width: 280,
    height: 280,
    units: 'mm',
    title: false,
    minValue: 0.00,
    maxValue: 25.00,
    majorTicks: ['0','2.5','5','7.5','10','12.5','15','17.5','20','22.5','25'],
    minorTicks: 2,
    strokeTicks: false,
    highlights: [{ from: 0, to: 25, color: '#00d4ff' }],
    colorPlate: '#1a1a2e',
    colorMajorTicks: '#f5f5f5',
    colorMinorTicks: '#555577',
    colorTitle: '#fff',
    colorUnits: '#8888aa',
    colorNumbers: '#e0e0e0',
    colorNeedle: 'rgba(0, 212, 255, 1)',
    colorNeedleEnd: 'rgba(0, 180, 220, .9)',
    colorBorderOuter: '#2a2a4a',
    colorBorderOuterEnd: '#1a1a2e',
    colorBorderMiddle: '#2a2a4a',
    colorBorderMiddleEnd: '#0f0f1a',
    colorBorderInner: '#1a1a2e',
    colorBorderInnerEnd: '#0f0f1a',
    colorNeedleShadowUp: 'rgba(0,0,0,0)',
    colorNeedleShadowDown: 'rgba(0,0,0,0.3)',
    valueBox: false,
    valueInt: 2,
    valueDec: 2,
    animation: false,
});
gaugemicrom.draw();
</script>

<script>
var msgold = "***";
var oldg = 0;
var maxg = 0;
var max = 0;
var k = 0;
var pdata = new Array();
var pdindex = new Array();
var msg = "";
var startflag = 0;
var stepflag = 0;
var i = 0;

// Modalità scansione: ogni preset definisce campioni media, micropassi per unità,
// passo motore totale per coprire 360° camma e quante letture aggregare per ogni
// grado camma (subStepsPerDeg). Per modalità ad alta densità il file di output
// resta a 360 punti, ottenuti come media di subStepsPerDeg letture vicine.
var SCAN_MODES = {
    fast:   { samples: 1, microsteps: 32, totalSteps: 360,   subStepsPerDeg: 1,  label: 'Veloce',   timeSec: 60   },
    std:    { samples: 3, microsteps: 32, totalSteps: 360,   subStepsPerDeg: 1,  label: 'Standard', timeSec: 110  },
    race:   { samples: 3, microsteps: 16, totalSteps: 720,   subStepsPerDeg: 2,  label: 'Race',     timeSec: 220  },
    ultra:  { samples: 5, microsteps: 16, totalSteps: 720,   subStepsPerDeg: 2,  label: 'Ultra',    timeSec: 350  },
    hyper:  { samples: 1, microsteps: 4,  totalSteps: 2880,  subStepsPerDeg: 8,  label: 'Hyper',    timeSec: 460  },
    atomic: { samples: 1, microsteps: 1,  totalSteps: 11520, subStepsPerDeg: 32, label: 'Atomic',   timeSec: 1820 }
};
var currentMode = SCAN_MODES.fast;
// Buffer di accumulo per modalità ad alta densità (chiave = grado camma 1..360)
var subBuffer = {};

function onScanModeChange() {
    var sel = document.getElementById('scanMode');
    if (!sel) return;
    currentMode = SCAN_MODES[sel.value] || SCAN_MODES.fast;
    if (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1) {
        sendSocket.send('c' + currentMode.samples);
        sendSocket.send('r' + currentMode.microsteps);
    }
}

// Status indicators state
var lastSensorRx     = 0;   // timestamp ultima misura numerica VALIDA
var lastSensorAnyRx  = 0;   // timestamp ultima risposta dal firmware (anche NaN)
var lastEncoderRx    = 0;
var consecutiveNaN   = 0;   // contatore NaN consecutivi → auto-stop scan
var SENSOR_FRESH_MS    = 3000;
var SENSOR_DEAD_MS     = 5000;   // oltre questo: rosso (nessun frame dal firmware)
var ENCODER_FRESH_MS   = 8000;
var NAN_TO_AUTOSTOP    = 3;

function updateStatusLeds() {
    var ledSrv = document.getElementById('ledServer');
    var ledSen = document.getElementById('ledSensor');
    var ledEnc = document.getElementById('ledEncoder');
    if (!ledSrv) return;
    var wsOk = (typeof engineSocket !== 'undefined' && engineSocket.readyState === 1) &&
               (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1);
    var now = Date.now();
    ledSrv.className = 'led ' + (wsOk ? 'ok' : 'err');
    // Sensore: verde se misure valide fresche, giallo se NaN o nessuna misura valida ma firmware risponde, rosso se firmware morto
    var senClass = '';
    if (lastSensorAnyRx === 0)                            senClass = '';        // mai ricevuto nulla
    else if ((now - lastSensorAnyRx) > SENSOR_DEAD_MS)    senClass = 'err';     // firmware non risponde
    else if ((now - lastSensorRx) > SENSOR_FRESH_MS)      senClass = 'warn';    // sensore scollegato (NaN)
    else                                                  senClass = 'ok';      // tutto bene
    ledSen.className = 'led ' + senClass;
    var encOk = (now - lastEncoderRx) < ENCODER_FRESH_MS;
    ledEnc.className = 'led ' + (encOk ? 'ok' : (lastEncoderRx === 0 ? '' : 'warn'));
}
setInterval(updateStatusLeds, 700);

// Probe periodico encoder per mantenere fresco lo stato (ogni 5s in idle)
setInterval(function() {
    if (typeof sendSocket !== 'undefined' && sendSocket && sendSocket.readyState === 1
        && (typeof startflag === 'undefined' || startflag !== 1)) {
        try { sendSocket.send('?'); } catch(e) {}
    }
}, 5000);

var engineSocket = new WebSocket("ws:localhost:8080");

engineSocket.onopen = function(event) {
    document.imp2.imp2.value = "  gradi  " + "0";
    document.cpot.cpot.value = " " + "00.00";
    gaugemicrom.value = 0;
    gaugemicrom.draw();
    sendSocket = new WebSocket("ws:localhost:8080");
    msgold = "***";
};

engineSocket.onmessage = function(event) {
    msg = event.data;

    // Riconosce solo righe puramente numeriche come misura del sensore Neoteck.
    // Risposte come "encoder=...", "raw=...", "*se", "*pos" non sono misure.
    var isNumericMeasure = /^-?\d+(\.\d+)?$|^NaN$/.test(msg);

    // Tracking timestamps per indicatori stato sensori
    if (isNumericMeasure) {
        lastSensorAnyRx = Date.now();
        if (msg !== 'NaN') {
            lastSensorRx = Date.now();
            consecutiveNaN = 0;
        } else {
            consecutiveNaN++;
        }
    }
    if (msg.indexOf('encoder=') >= 0 || msg === '*pos') {
        lastEncoderRx = Date.now();
    }

    if (isNumericMeasure) {
        var n = Number(msg);
        if (Number(msg) < 10) { msg2 = "0" + msg; }
        else { msg2 = msg; }

        if (n >= 0 && n < 32) {
            document.cpot.cpot.value = " " + msg2;
            gaugemicrom.value = msg;
            gaugemicrom.draw();
        } else {
            msg = "0.00";
            document.cpot.cpot.value = "NO SENSORE";
            // Auto-stop scan dopo N NaN consecutivi
            if (typeof startflag !== 'undefined' && startflag === 1 && consecutiveNaN >= NAN_TO_AUTOSTOP) {
                startflag = 0;
                if (typeof stop === 'function') { try { stop(); } catch(e) {} }
                console.warn('Auto-stop scan: sensore non risponde (' + consecutiveNaN + ' NaN consecutivi)');
            }
        }

        if (startflag == 1 & i <= currentMode.totalSteps & stepflag == 0) {
            // Bin angolare 1..360 (grado camma reale). Se subStepsPerDeg>1 aggreghiamo
            // più letture nello stesso bin con media filtrata di NaN.
            var deg = Math.floor((i - 1) / currentMode.subStepsPerDeg) + 1;
            if (deg < 1) deg = 1;
            if (deg > 360) deg = 360;
            var v = Number(msg);
            if (currentMode.subStepsPerDeg <= 1) {
                pdindex[deg] = deg;
                pdata[deg]   = v;
            } else {
                if (!subBuffer[deg]) subBuffer[deg] = [];
                if (!isNaN(v)) subBuffer[deg].push(v);
                if (subBuffer[deg].length >= currentMode.subStepsPerDeg) {
                    var sum = 0;
                    for (var k = 0; k < subBuffer[deg].length; k++) sum += subBuffer[deg][k];
                    pdindex[deg] = deg;
                    pdata[deg]   = sum / subBuffer[deg].length;
                }
            }

            // Tracking massimo (su valore corrente del bin, anche se non ancora chiuso)
            var currentBinVal = (currentMode.subStepsPerDeg <= 1) ? pdata[deg]
                                : (subBuffer[deg] ? subBuffer[deg].reduce(function(a,b){return a+b;}, 0)/subBuffer[deg].length : 0);
            if (currentBinVal > max) {
                max = currentBinVal;
                maxg = deg;
            }
            document.mas.mas.value = " max  " + maxg + " gradi       " + max.toFixed(3);

            // Update Chart.js solo quando un bin si chiude (evita lag a 11520 punti)
            if (currentMode.subStepsPerDeg <= 1 ||
                (subBuffer[deg] && subBuffer[deg].length === currentMode.subStepsPerDeg)) {
                config.data.labels.push(deg);
                config.data.datasets.forEach(function(dataset){ dataset.data.push(pdata[deg]); });
                window.myLine.update();
            }
        }
    }

    if (i == currentMode.totalSteps) {
        if (startflag == 1) {
            var x = "sequenza di misura   terminata ";
            responsiveVoice.speak(x, "Italian Female", { volume: 3 });
        }
        startflag = 0;

        if (labms == 1) {
            // 0 virtuale: porta la camma a +180° dal picco (in gradi camma).
            // Converte in unità di scansione attuali (1 unità = 1/subStepsPerDeg gradi camma).
            var degTarget = (Number(maxg) + 180) % 360;
            var units     = Math.round(degTarget * currentMode.subStepsPerDeg);
            // Convenzione direzione: usa la stessa rsign della scansione appena finita.
            var cmd = (rsign == -1 ? '$-' : '$+') + units;
            sendSocket.send(cmd);
            oldg = degTarget;
            var stepEl = document.getElementById("step");
            if (stepEl) stepEl.value = oldg;
            labms = 0;
            // Attendi un attimo per dare tempo al motore di completare il movimento
            // prima del reload (movimento di 180° camma può richiedere fino a ~10s in atomic).
            setTimeout(function(){ location.reload(true); }, 1500);
        }
    }

    // Avanza alla prossima misura SOLO se siamo in una scansione attiva (startflag==1)
    // e il terminatore è quello di una misura (*se), non altri (*pos / *zero / *dbg).
    if (msg === '*se') {
        // visualizza progresso in gradi camma reali (i sub-step ÷ subStepsPerDeg)
        var degShown = (i / currentMode.subStepsPerDeg).toFixed(2);
        document.imp2.imp2.value = "  gradi  " + degShown;
        if (startflag == 1 && i < currentMode.totalSteps && stepflag == 0) {
            if (rsign == 1) { sendSocket.send('p'); }
            if (rsign == -1) { sendSocket.send('q'); }
            i = i + 1;
        }
    }
};
</script>

<script>
var i = 0;
function start() {
    var x = "sequenza di misura   iniziata ";
    responsiveVoice.speak(x, "Italian Female", { volume: 3 });
    // reset COMPLETO stato scansione (incluso il contatore i: senza questo,
    // se il motore è stato mosso prima, i poteva già essere >= totalSteps
    // e il loop non avanzava mai)
    i = 0;
    consecutiveNaN = 0;
    subBuffer = {};
    pdata.length = 0; pdindex.length = 0;
    max = 0; maxg = 0;
    if (config && config.data) { config.data.labels.length = 0; config.data.datasets.forEach(function(d){ d.data.length = 0; }); }
    if (window.myLine) { try { window.myLine.update(); } catch(e) {} }
    i = i + 1;
    document.imp2.imp2.value = "  gradi  " + (i / currentMode.subStepsPerDeg).toFixed(2);
    if (rsign == 1) { sendSocket.send('p'); }
    if (rsign == -1) { sendSocket.send('q'); }
    stepflag = 0;
    startflag = 1;
}
</script>

<script>
var stepflag = 0;
function stop() {
    // Ferma definitivamente la scansione: il prossimo START riparte da zero.
    // Niente più toggle implicito: per riprendere dallo stesso punto va
    // creato in futuro un bottone RIPRENDI dedicato.
    stepflag  = 1;
    startflag = 0;
    labms     = 0;     // annulla anche un eventuale 0 virtuale in corso
}
</script>

<script src="Chart.min.js"></script>
<script src="Chart.bundle.js"></script>
<script src="samples/utils.js"></script>

<script>
var chartColors = {
    red: 'rgb(255,0, 0)',
    orange: 'rgb(255, 159, 64)',
    yellow: 'rgb(255, 205, 86)',
    green: 'rgb(75, 192, 192)',
    blue: 'rgb(54, 162, 235)',
    purple: 'rgb(153, 102, 255)',
    grey: 'rgb(231,233,237)'
};

var config = {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'mm',
            backgroundColor: '#00d4ff',
            borderColor: '#00d4ff',
            data: [],
            fill: false,
            pointHoverRadius: 5,
            pointRadius: 0,
        }]
    },
    options: {
        responsive: true,
        title: { display: false, text: 'test' },
        tooltips: { mode: 'index', intersect: false },
        hover: { mode: 'nearest', intersect: true },
        legend: { labels: { fontColor: '#8888aa' } },
        scales: {
            xAxes: [{
                display: false,
                scaleLabel: { display: true, labelString: 'gradi', fontColor: '#8888aa' },
                gridLines: { color: "#2a2a4a" }
            }],
            yAxes: [{
                display: true,
                scaleLabel: { display: true, labelString: 'misura mm', fontColor: '#8888aa' },
                gridLines: { color: "#2a2a4a" },
                ticks: { fontColor: '#8888aa' }
            }]
        }
    }
};

window.onload = function() {
    var ctx = document.getElementById('grafico').getContext('2d');
    window.myLine = new Chart(ctx, config);
};
</script>

<script>
var i = 0;
var dato = 0;
var newlabel;
function insert() {
    i = i + 1;
    newlabel = 5;
    dato = 20;
    config.data.labels.push(newlabel);
    config.data.datasets.forEach((dataset) => {
        dataset.data.push(dato);
    });
    window.myLine.update();
}
</script>

<script>
function reset() {
    while (config.data.labels.length > 0) {
        config.data.labels.pop();
        config.data.datasets.forEach((dataset) => {
            dataset.data.pop();
        });
    }
    window.myLine.update();
}
</script>

<script>
function update() {
    for (k = 1; k <= 360; k++) {
        newlabel = k;
        birdsData.labels.push(newlabel);
        birdsData.datasets.forEach((dataset) => {
            dataset.data.push(k * 10);
        });
    }
    window.polarAreaChart.update();
}
</script>

<script>
var stringa = "";
function sav() {
    for (t = 1; t < pdindex.length; t++) {
        stringa = stringa + pdindex[t] + "," + pdata[t] + "\r\n";
    }
    fname = document.getElementById("nome").value;
    fname = fname + "_alz";
    stringa2 = "*" + fname + "*" + "_pline" + "\r\n" + stringa;
    sendSocket.send(stringa2);
    document.salva.salva.value = " file salvato";
}
</script>

<script>
var dif = 0;
function ruota() {
    dg = document.getElementById("step").value;
    w = "rotazione a   " + dg + " gradi  attivata";
    responsiveVoice.speak(w, "Italian Female", { volume: 3 });

    if (dg - oldg < 0) {
        dif = -(dg - oldg);
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 & dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$-" + (dif); }
        if (rsign == -1) { crot = "$+" + (dif); }
    }
    if (dg - oldg > 0) {
        dif = dg - oldg;
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 & dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$+" + (dif); }
        if (rsign == -1) { crot = "$-" + (dif); }
    }
    if (dg - oldg != 0) { sendSocket.send(crot); }
    oldg = dg;
}
</script>

<script>
function p1() {
    oldg = Number(oldg) + 1;
    if (rsign == 1) { sendSocket.send('$+001'); }
    if (rsign == -1) { sendSocket.send('$-001'); }
    document.getElementById("step").value = oldg;
}
</script>

<script>
function m1() {
    oldg = Number(oldg) - 1;
    if (rsign == 1) { sendSocket.send('$-001'); }
    if (rsign == -1) { sendSocket.send('$+001'); }
    document.getElementById("step").value = oldg;
}
</script>

<script>
var labms = 0;
function ms() {
    i = 0;
    labms = 1;
    max = 0;
    maxg = 0;
    document.mas.mas.value = " max  " + maxg + " gradi" + "       " + max;
    reset();
    start();
}
</script>

<script>
var rot = 0;
var rsign = 1;
function rlb() {
    rot = rot + 1;
    if (rot == 2) { rot = 0; }
    if (rot == 0) {
        document.getElementById("rlabel").innerHTML = "senso orario";
        rsign = 1;
    }
    if (rot == 1) {
        document.getElementById("rlabel").innerHTML = "senso antiorario";
        rsign = -1;
    }
}
</script>

</body>
</html>
