<!doctype html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>CAMMES - Alzata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script src="gauge.min.js"></script>
<script src="charts/jquery.min.js"></script>
<script src="responsivevoice.js"></script>

<div class="app-container">

    <!-- Header -->
    <div class="header">
        <img src="images/logo.jpg" alt="CAMMES">
        <h1>CAMMES</h1>
        <div class="nav-links">
            <a href="alzata.html" class="active">Alzata</a>
            <a href="polare.html">Polare</a>
            <a href="grafici.html">Grafici</a>
            <a href="analisi.html">Analisi</a>
        </div>
    </div>

    <!-- Main content: Gauge + Chart -->
    <div class="main-grid">

        <!-- Left: Gauge -->
        <div class="card gauge-card">
            <div class="card-title">Misura in tempo reale</div>
            <canvas id="microm"></canvas>
            <form name="cpot">
                <input type="text" name="cpot" readonly class="gauge-value">
            </form>
            <form name="imp2">
                <input type="text" name="imp2" readonly class="gauge-degrees">
            </form>
        </div>

        <!-- Right: Chart -->
        <div class="card chart-card">
            <div class="card-title">Profilo Alzata 360°</div>
            <canvas id="grafico" width="900" height="500"></canvas>
        </div>

    </div>

    <!-- Controls -->
    <div class="card">
        <div class="card-title">Controlli</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-success" onclick="start();">&#9654; START</button>
                <button class="btn btn-danger" onclick="stop();">&#10074;&#10074; PAUSA</button>
                <button class="btn btn-secondary" onclick="location.reload(true);">&#8634; RESET</button>
            </div>

            <div class="separator"></div>

            <form name="mas">
                <input type="text" name="mas" value=" max" readonly class="max-display">
            </form>

            <div class="separator"></div>

            <div class="controls-group">
                <input type="text" id="nome" placeholder="nome file" class="input">
                <input type="submit" value="Salva" class="btn btn-accent" onclick="sav();">
            </div>
            <form name="salva" style="display:inline;">
                <input type="text" name="salva" readonly class="status-text" style="background:transparent;border:none;" size="12">
            </form>
        </div>
    </div>

    <!-- Manual rotation -->
    <div class="card">
        <div class="card-title">Rotazione manuale</div>
        <div class="controls-row">
            <div class="controls-group">
                <button class="btn btn-secondary btn-sm" onclick="m1();">&#8722;</button>
                <input type="text" name="step" placeholder="gradi" id="step" class="input" style="width:120px;">
                <button class="btn btn-secondary btn-sm" onclick="p1();">+</button>
                <button class="btn btn-accent" id="cf" onclick="ruota();">Ruota</button>
            </div>

            <div class="separator"></div>

            <button class="btn btn-secondary" onclick="ms();" title="Zero virtuale">
                &#9678; Zero virtuale
            </button>

            <div class="separator"></div>

            <div class="toggle-group">
                <label class="switch">
                    <input type="checkbox" onchange="rlb();">
                    <span class="slider"></span>
                </label>
                <span class="toggle-label" id="rlabel">senso orario</span>
            </div>
        </div>
    </div>

</div>

<!-- ============================================
     JavaScript - Logica invariata
     ============================================ -->

<script>
// Gauge setup
var gaugemicrom = new RadialGauge({
    renderTo: 'microm',
    width: 280,
    height: 280,
    units: 'mm',
    title: false,
    minValue: 0.00,
    maxValue: 25.00,
    majorTicks: ['0','2.5','5','7.5','10','12.5','15','17.5','20','22.5','25'],
    minorTicks: 2,
    strokeTicks: false,
    highlights: [{ from: 0, to: 25, color: '#00d4ff' }],
    colorPlate: '#1a1a2e',
    colorMajorTicks: '#f5f5f5',
    colorMinorTicks: '#555577',
    colorTitle: '#fff',
    colorUnits: '#8888aa',
    colorNumbers: '#e0e0e0',
    colorNeedle: 'rgba(0, 212, 255, 1)',
    colorNeedleEnd: 'rgba(0, 180, 220, .9)',
    colorBorderOuter: '#2a2a4a',
    colorBorderOuterEnd: '#1a1a2e',
    colorBorderMiddle: '#2a2a4a',
    colorBorderMiddleEnd: '#0f0f1a',
    colorBorderInner: '#1a1a2e',
    colorBorderInnerEnd: '#0f0f1a',
    colorNeedleShadowUp: 'rgba(0,0,0,0)',
    colorNeedleShadowDown: 'rgba(0,0,0,0.3)',
    valueBox: false,
    valueInt: 2,
    valueDec: 2,
    animation: false,
});
gaugemicrom.draw();
</script>

<script>
var msgold = "***";
var oldg = 0;
var maxg = 0;
var max = 0;
var k = 0;
var pdata = new Array();
var pdindex = new Array();
var msg = "";
var engineSocket = new WebSocket("ws:localhost:8080");

engineSocket.onopen = function(event) {
    document.imp2.imp2.value = "  gradi  " + "0";
    document.cpot.cpot.value = " " + "00.00";
    gaugemicrom.value = 0;
    gaugemicrom.draw();
    sendSocket = new WebSocket("ws:localhost:8080");
    msgold = "***";
};

engineSocket.onmessage = function(event) {
    msg = event.data;

    if (msg.substring(0, 1) != "*") {
        if (Number(msg) < 10) { msg2 = "0" + msg; }
        else { msg2 = msg; }

        if (msg < 32) {
            document.cpot.cpot.value = " " + msg2;
            gaugemicrom.value = msg;
            gaugemicrom.draw();
        } else {
            msg = "0.00";
            document.cpot.cpot.value = "mic out";
        }

        if (startflag == 1 & i <= 360 & stepflag == 0) {
            pdindex[i] = i;
            pdata[i] = Number(msg);

            if (pdata[i] > max) {
                max = pdata[i];
                maxg = pdindex[i];
            }

            document.mas.mas.value = " max  " + maxg + " gradi" + "       " + max;
            config.data.labels.push(i);
            config.data.datasets.forEach((dataset) => {
                dataset.data.push(msg);
            });
            window.myLine.update();
        }
    }

    if (i == 360) {
        if (startflag == 1) {
            var x = "sequenza di misura   terminata ";
            responsiveVoice.speak(x, "Italian Female", { volume: 3 });
        }
        startflag = 0;

        if (labms == 1) {
            rgradi = Number(maxg);
            rgradi = rgradi + 180;
            if (rgradi < 10) { rgradi = "00" + rgradi; }
            if (rgradi < 100 & rgradi > 9) { rgradi = "0" + rgradi; }
            if (rsign == 1) { rgradi2 = "$+" + rgradi; }
            if (rsign == -1) { rgradi2 = "$-" + rgradi; }
            sendSocket.send(rgradi2);
            oldg = rgradi;
            document.getElementById("step").value = oldg;
            labms = 0;
            location.reload(true);
        }
    }

    if (msg.substring(0, 1) == "*") {
        document.imp2.imp2.value = "  gradi  " + i;
        if (i < 360) {
            if (stepflag == 0) {
                if (rsign == 1) { sendSocket.send('p'); }
                if (rsign == -1) { sendSocket.send('q'); }
                i = i + 1;
            }
        }
    }
};
</script>

<script>
var i = 0;
function start() {
    var x = "sequenza di misura   iniziata ";
    responsiveVoice.speak(x, "Italian Female", { volume: 3 });
    i = i + 1;
    document.imp2.imp2.value = "  gradi  " + i;
    if (rsign == 1) { sendSocket.send('p'); }
    if (rsign == -1) { sendSocket.send('q'); }
    stepflag = 0;
    startflag = 1;
}
</script>

<script>
var stepflag = 0;
function stop() {
    if (stepflag == 0) { stepflag = 1; }
    else {
        if (stepflag == 1) { stepflag = 0; }
    }
}
</script>

<script src="Chart.min.js"></script>
<script src="Chart.bundle.js"></script>
<script src="samples/utils.js"></script>

<script>
var chartColors = {
    red: 'rgb(255,0, 0)',
    orange: 'rgb(255, 159, 64)',
    yellow: 'rgb(255, 205, 86)',
    green: 'rgb(75, 192, 192)',
    blue: 'rgb(54, 162, 235)',
    purple: 'rgb(153, 102, 255)',
    grey: 'rgb(231,233,237)'
};

var config = {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'mm',
            backgroundColor: '#00d4ff',
            borderColor: '#00d4ff',
            data: [],
            fill: false,
            pointHoverRadius: 5,
            pointRadius: 0,
        }]
    },
    options: {
        responsive: true,
        title: { display: false, text: 'test' },
        tooltips: { mode: 'index', intersect: false },
        hover: { mode: 'nearest', intersect: true },
        legend: { labels: { fontColor: '#8888aa' } },
        scales: {
            xAxes: [{
                display: false,
                scaleLabel: { display: true, labelString: 'gradi', fontColor: '#8888aa' },
                gridLines: { color: "#2a2a4a" }
            }],
            yAxes: [{
                display: true,
                scaleLabel: { display: true, labelString: 'misura mm', fontColor: '#8888aa' },
                gridLines: { color: "#2a2a4a" },
                ticks: { fontColor: '#8888aa' }
            }]
        }
    }
};

window.onload = function() {
    var ctx = document.getElementById('grafico').getContext('2d');
    window.myLine = new Chart(ctx, config);
};
</script>

<script>
var i = 0;
var dato = 0;
var newlabel;
function insert() {
    i = i + 1;
    newlabel = 5;
    dato = 20;
    config.data.labels.push(newlabel);
    config.data.datasets.forEach((dataset) => {
        dataset.data.push(dato);
    });
    window.myLine.update();
}
</script>

<script>
function reset() {
    while (config.data.labels.length > 0) {
        config.data.labels.pop();
        config.data.datasets.forEach((dataset) => {
            dataset.data.pop();
        });
    }
    window.myLine.update();
}
</script>

<script>
function update() {
    for (k = 1; k <= 360; k++) {
        newlabel = k;
        birdsData.labels.push(newlabel);
        birdsData.datasets.forEach((dataset) => {
            dataset.data.push(k * 10);
        });
    }
    window.polarAreaChart.update();
}
</script>

<script>
var stringa = "";
function sav() {
    for (t = 1; t < pdindex.length; t++) {
        stringa = stringa + pdindex[t] + "," + pdata[t] + "\r\n";
    }
    fname = document.getElementById("nome").value;
    fname = fname + "_alz";
    stringa2 = "*" + fname + "*" + "_pline" + "\r\n" + stringa;
    sendSocket.send(stringa2);
    document.salva.salva.value = " file salvato";
}
</script>

<script>
var dif = 0;
function ruota() {
    dg = document.getElementById("step").value;
    w = "rotazione a   " + dg + " gradi  attivata";
    responsiveVoice.speak(w, "Italian Female", { volume: 3 });

    if (dg - oldg < 0) {
        dif = -(dg - oldg);
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 & dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$-" + (dif); }
        if (rsign == -1) { crot = "$+" + (dif); }
    }
    if (dg - oldg > 0) {
        dif = dg - oldg;
        if (dif < 10) { dif = "00" + dif; }
        if (dif < 100 & dif >= 10) { dif = "0" + dif; }
        if (rsign == 1) { crot = "$+" + (dif); }
        if (rsign == -1) { crot = "$-" + (dif); }
    }
    if (dg - oldg != 0) { sendSocket.send(crot); }
    oldg = dg;
}
</script>

<script>
function p1() {
    oldg = Number(oldg) + 1;
    if (rsign == 1) { sendSocket.send('$+001'); }
    if (rsign == -1) { sendSocket.send('$-001'); }
    document.getElementById("step").value = oldg;
}
</script>

<script>
function m1() {
    oldg = Number(oldg) - 1;
    if (rsign == 1) { sendSocket.send('$-001'); }
    if (rsign == -1) { sendSocket.send('$+001'); }
    document.getElementById("step").value = oldg;
}
</script>

<script>
var labms = 0;
function ms() {
    i = 0;
    labms = 1;
    max = 0;
    maxg = 0;
    document.mas.mas.value = " max  " + maxg + " gradi" + "       " + max;
    reset();
    start();
}
</script>

<script>
var rot = 0;
var rsign = 1;
function rlb() {
    rot = rot + 1;
    if (rot == 2) { rot = 0; }
    if (rot == 0) {
        document.getElementById("rlabel").innerHTML = "senso orario";
        rsign = 1;
    }
    if (rot == 1) {
        document.getElementById("rlabel").innerHTML = "senso antiorario";
        rsign = -1;
    }
}
</script>

</body>
</html>
